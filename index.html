    }
    @media (prefers-reduced-motion: reduce) {
      .cib-drift-bg { animation: none; background-position: 0% 50%; }

    @keyframes cibPulseRing {

    @media (prefers-reduced-motion: reduce) {

    }
  </style>

  <script>
    // LocalStorage Shim for window.storage to persist state in standard browsers
    if (!window.storage) {
      window.storage = {
        get: async (key) => {
          try {
            const value = localStorage.getItem(key);
            return value ? { value } : null;
          } catch (e) {
            console.error("Failed to read from localStorage", e);
            return null;
          }
        },
        set: async (key, value) => {
          try {
            localStorage.setItem(key, value);
          } catch (e) {
            console.error("Failed to write to localStorage", e);
          }
        }
      };
    }
  </script>

    // ─── Shared PDF export: renders the same plain-text summary used by
    // "Copy answers" into a paginated, downloadable PDF. ───
    function exportTextToPDF(filename, headingTitle, bodyText) {
      const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
      if (!jsPDFCtor) {
        window.alert("PDF export isn't available right now. Please check your connection and try again.");
        return;
      }
      const doc = new jsPDFCtor({ unit: "pt", format: "letter" });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 54;
      const maxWidth = pageWidth - margin * 2;
      let y = margin;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.setTextColor(31, 58, 52);
      doc.splitTextToSize(headingTitle, maxWidth).forEach((line) => {
        doc.text(line, margin, y);
        y += 20;
      });
      y += 8;

      doc.setFont("courier", "normal");
      doc.setFontSize(9.5);
      doc.setTextColor(34, 49, 44);
      const lineHeight = 13;

      bodyText.split("\n").forEach((rawLine) => {
        const isHeading = rawLine.length > 0 && !/^\s/.test(rawLine) && !/^\d/.test(rawLine) && rawLine === rawLine.trim() && rawLine.length < 60 && !rawLine.includes(":");
        const wrapped = doc.splitTextToSize(rawLine.length ? rawLine : " ", maxWidth);
        wrapped.forEach((line) => {
          if (y + lineHeight > pageHeight - margin) {
            doc.addPage();
            y = margin;
          }
          doc.setFont("courier", isHeading ? "bold" : "normal");
          doc.text(line, margin, y);
          y += lineHeight;
        });
      });

      doc.save(filename);
    }

    // ─── Shared "data entry" export ───
    // Produces the compact list a clinician types into the Child First
    // data-entry program after finishing an assessment. The program shows
    // "Item 1 … Item N" fields and accepts only numbers, so this view maps
    // each item to the exact number to key in.
    //
    // Ordering matters: some instruments present items grouped by subscale
    // (e.g. PKBS-2 shows Social Cooperation, then Interaction, …) while the
    // Child First program numbers them by the instrument's *official* item
    // order. Those official numbers are encoded in each question id
    // (ss01…ss34 = Social Skills items 1–34, pb01…pb42 = Problem Behavior
    // items 1–42, i01…i36 = PSI items 1–36). When `pageLabels` is supplied
    // and every item's id prefix is known, we regroup and renumber by that
    // official order so the printed "Item N" lines up with the program's
    // "Item N". Otherwise we fall back to the on-screen order (which already
    // matches for the PSI-4-SF and single-page instruments).
    //
    // `valueOf(q)` must return the number to type (or null if unanswered) —
    // each recorder passes its own getScore, which already yields the
    // program's coding (PSI-4-SF: SA=5…SD=1; PKBS-2: Never=0…Often=3).
    function buildDataEntryGroups(form, valueOf, pageLabels) {
      const askable = form.questions.filter((q) => q.text && q.text.trim().length > 0);
      const parseId = (id) => {
        const m = String(id).match(/^([A-Za-z]+)(\d+)$/);
        return m ? { prefix: m[1], num: parseInt(m[2], 10) } : { prefix: "", num: null };
      };
      const usePages =
        pageLabels &&
        askable.length > 0 &&
        askable.every((q) => {
          const p = parseId(q.id);
          return p.prefix && p.num !== null && pageLabels[p.prefix];
        });

      let groups;
      if (usePages) {
        const order = [];
        const byPrefix = {};
        askable.forEach((q) => {
          const { prefix, num } = parseId(q.id);
          if (!byPrefix[prefix]) { byPrefix[prefix] = []; order.push(prefix); }
          byPrefix[prefix].push({ item: num, value: valueOf(q) });
        });
        groups = order.map((p) => ({
          label: pageLabels[p],
          rows: byPrefix[p].sort((a, b) => a.item - b.item),
        }));
      } else {
        groups = [{
          label: null,
          rows: askable.map((q, i) => ({ item: i + 1, value: valueOf(q) })),
        }];
      }
      // Drop pages that were never filled in (e.g. only one PKBS scale run).
      return groups.filter((g) => g.rows.some((r) => r.value !== null && r.value !== undefined));
    }

    function dataEntryText(form, groups, dateStr) {
      const fmt = (v) => (v === null || v === undefined ? "—" : String(v));
      const lines = [(form.title || "Assessment") + " — data entry", dateStr, ""];
      groups.forEach((g, gi) => {
        if (g.label) {
          if (gi > 0) lines.push("");
          lines.push(g.label);
        }
        g.rows.forEach((r) => lines.push("Item " + r.item + ": " + fmt(r.value)));
      });
      return lines.join("\n");
    }

    // On-screen card that mirrors dataEntryText, with a one-tap copy button.
    function DataEntryCard({ groups, dateStr, title }) {
      const [copied, setCopied] = React.useState(false);
      if (!groups || groups.length === 0) return null;
      const fmt = (v) => (v === null || v === undefined ? "—" : String(v));
      const copy = async () => {
        const text = dataEntryText({ title }, groups, dateStr);
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
        } catch (e) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setCopied(true);
          } catch (err) { setCopied(false); }
        }
        setTimeout(() => setCopied(false), 2000);
      };
      return (
        <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "2px solid var(--moss)" }}>
          <div className="flex justify-between items-center mb-1">
            <div className="cib-body text-xs font-bold uppercase tracking-widest" style={{ color: "var(--moss)", letterSpacing: "0.14em" }}>
              Data entry — type these into Child First
            </div>
            <button onClick={copy} className="text-xs font-bold rounded-full px-3 py-1 transition-colors hover:bg-opacity-90 flex-shrink-0" style={{ background: "var(--moss)", color: "var(--cream-on-dark)" }}>
              {copied ? "Copied" : "Copy numbers"}
            </button>
          </div>
          <p className="text-xs mb-3" style={{ color: "var(--ink-soft)" }}>
            Item numbers match the program's fields. Read straight down and key in each number.
          </p>
          {groups.map((g, gi) => (
            <div key={gi} className={gi > 0 ? "mt-3" : ""}>
              {g.label && (
                <div className="text-xs font-bold mb-1" style={{ color: "var(--spruce)" }}>{g.label}</div>
              )}
              <div className="grid grid-cols-2 gap-x-4" style={{ fontFamily: "monospace" }}>
                {g.rows.map((r) => (
                  <div key={r.item} className="flex justify-between items-baseline py-0.5 text-sm" style={{ borderBottom: "1px solid var(--mist)" }}>
                    <span style={{ color: "var(--ink-soft)" }}>Item {r.item}</span>
                    <span className="font-bold" style={{ color: r.value === null || r.value === undefined ? "var(--ink-soft)" : "var(--spruce)" }}>{fmt(r.value)}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // Component 1: PSI-4-SF Response Recorder
    // ─────────────────────────────────────────────────────────────
    function PSI4SFRecorder({ onBack }) {
      const [form, setForm] = useState(psiForm);
      const [mode, setMode] = useState("build"); // build | fill | done
      const [answers, setAnswers] = useState({});
      const [idx, setIdx] = useState(0);
      const [saveState, setSaveState] = useState("idle");
      const [copied, setCopied] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);
      const [showDisclaimer, setShowDisclaimer] = useState(true);
      const loadedRef = useRef(false);

      // Load saved form design if any
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            if (!window.storage) {
              if (alive) setSaveState("off");
              loadedRef.current = true;
              return;
            }
            const result = await window.storage.get(FORM_STORAGE_KEY_PSI);
            if (alive && result && result.value) {
              const parsed = JSON.parse(result.value);
              if (parsed && Array.isArray(parsed.questions)) {
                setForm(parsed);
              }
            }
          } catch (e) {
            // ignore
          } finally {
            loadedRef.current = true;
          }
        })();
        return () => { alive = false; };
      }, []);

      // Persist form design
      useEffect(() => {
        if (!loadedRef.current) return;
        let cancelled = false;
        const t = setTimeout(async () => {
          try {
            if (!window.storage) return;
            await window.storage.set(FORM_STORAGE_KEY_PSI, JSON.stringify(form));
            if (!cancelled) {
              setSaveState("saved");
              setTimeout(() => { if (!cancelled) setSaveState("idle"); }, 1500);
            }
          } catch (e) {
            if (!cancelled) setSaveState("off");
          }
        }, 600);
        return () => { cancelled = true; clearTimeout(t); };
      }, [form]);

      // ─── editing helpers ───
      const updateQuestion = (id, patch) => {
        setForm((f) => ({
          ...f,
          questions: f.questions.map((q) => (q.id === id ? { ...q, ...patch } : q)),
        }));
      };
      const addQuestion = () => {
        setForm((f) => ({
          ...f,
          questions: [...f.questions, { id: newId(), text: "", type: "scale", category: "" }],
        }));
      };
      const removeQuestion = (id) => {
        setForm((f) => ({ ...f, questions: f.questions.filter((q) => q.id !== id) }));
      };
      const moveQuestion = (id, dir) => {
        setForm((f) => {
          const qs = [...f.questions];
          const i = qs.findIndex((q) => q.id === id);
          const j = i + dir;
          if (i < 0 || j < 0 || j >= qs.length) return f;
          [qs[i], qs[j]] = [qs[j], qs[i]];
          return { ...f, questions: qs };
        });
      };
      const updateScaleLabel = (i, value) => {
        setForm((f) => {
          const scale = [...f.scale];
          scale[i] = value;
          return { ...f, scale };
        });
      };
      const addScaleLabel = () => {
        setForm((f) => (f.scale.length >= 7 ? f : { ...f, scale: [...f.scale, "New option"] }));
      };
      const removeScaleLabel = (i) => {
        setForm((f) => (f.scale.length <= 2 ? f : { ...f, scale: f.scale.filter((_, k) => k !== i) }));
      };
      const resetToPSI = () => {
        if (!confirmReset) {
          setConfirmReset(true);
          setTimeout(() => setConfirmReset(false), 3000);
          return;
        }
        setConfirmReset(false);
        setForm(psiForm());
        setAnswers({});
      };

      const askable = form.questions.filter((q) => q.text.trim().length > 0);

      // ─── scoring ───
      const getScore = (q) => {
        const v = answers[q.id];
        if (v === undefined || v === null) return null;
        if (q.type === "choice" && Array.isArray(q.choices)) {
          const choice = q.choices[v];
          return choice ? choice.score : null;
        }
        if (q.type === "scale" && typeof v === "number") {
          const start = typeof form.scaleStart === "number" ? form.scaleStart : 1;
          return (form.scale.length - 1 - v) + start;
        }
        return null;
      };

      const categoryTotals = () => {
        const totals = {};
        askable.forEach((q) => {
          if (!q.category) return;
          const score = getScore(q);
          if (score === null) return;
          if (!totals[q.category]) totals[q.category] = { sum: 0, n: 0, max: 0 };
          totals[q.category].sum += score;
          totals[q.category].n += 1;
          totals[q.category].max += 5; // each item max = 5
        });
        const subKeys = Object.keys(totals);
        if (subKeys.length > 0) {
          let totalSum = 0, totalN = 0, totalMax = 0;
          subKeys.forEach((k) => {
            totalSum += totals[k].sum;
            totalN += totals[k].n;
            totalMax += totals[k].max;
          });
          totals["Total Stress"] = { sum: totalSum, n: totalN, max: totalMax };
        }
        return totals;
      };

      // ─── fill mode ───
      const startFill = () => {
        if (askable.length === 0) return;
        setAnswers({});
        setIdx(0);
        setCopied(false);
        setMode("fill");
      };
      const current = askable[idx];
      const next = () => {
        if (idx + 1 >= askable.length) setMode("done");
        else setIdx(idx + 1);
      };
      const back = () => {
        if (idx === 0) setMode("build");
        else setIdx(idx - 1);
      };

      // ─── results helpers ───
      // PSI items are shown in official order (i01…i36), so on-screen order
      // already matches the Child First program's Item 1…36 — no page map.
      const dataEntryGroups = () => buildDataEntryGroups(form, getScore, null);

      const summaryText = () => {
        const dateStr = new Date().toLocaleDateString();
        const lines = [dataEntryText(form, dataEntryGroups(), dateStr), "", "─────", ""];
        lines.push(form.title, dateStr, "");
        askable.forEach((q, i) => {
          const score = getScore(q);
          let a = "(skipped)";
          if (score !== null) {
            if (q.type === "choice" && Array.isArray(q.choices)) {
              a = q.choices[answers[q.id]]?.label + " (" + score + ")";
            } else if (q.type === "scale") {
              a = form.scale[answers[q.id]] + " (" + score + ")";
            }
          }
          lines.push((i + 1) + ". " + q.text);
          lines.push("   " + a);
        });
        const totals = categoryTotals();
        const keys = Object.keys(totals);
        if (keys.length) {
          lines.push("");
          lines.push("Subscale Totals");
          keys.forEach((k) => {
            lines.push(k + ": " + totals[k].sum + " of " + totals[k].max + " (" + totals[k].n + " items)");
          });
        }
        return lines.join("\n");
      };

      const copySummary = async () => {
        const text = summaryText();
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
        } catch (e) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setCopied(true);
          } catch (err) {
            setCopied(false);
          }
        }
        setTimeout(() => setCopied(false), 2000);
      };

      const exportPDF = () => {
        const slug = (form.title || "assessment").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        exportTextToPDF(
          slug + "-" + new Date().toISOString().slice(0, 10) + ".pdf",
          form.title + (form.subtitle ? " — " + form.subtitle : ""),
          summaryText()
        );
      };

      const Eyebrow = ({ children, dark }) => (
        <div
          className="cib-body text-xs font-bold uppercase tracking-widest mb-2"
          style={{ color: dark ? "var(--soft-on-dark)" : "var(--moss)", letterSpacing: "0.14em" }}
        >
          {children}
        </div>
      );

      const existingCategories = Array.from(
        new Set(form.questions.map((q) => q.category).filter(Boolean))
      );

      // ─── BUILD MODE ───
      if (mode === "build") {
        return (
          <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
            <style>{FONT_CSS_PSI}</style>
            <div className="max-w-md mx-auto px-4 pb-12 pt-8">

              {/* Back to Dashboard Banner */}
              <div className="flex justify-between items-center mb-6">
                <button onClick={onBack} className="text-xs font-bold uppercase tracking-wider transition-colors hover:text-[#7FA08C]" style={{ color: "var(--ink-soft)" }}>
                  &larr; Back to Dashboard
                </button>
              </div>

              <Eyebrow>PSI-4-SF Recorder</Eyebrow>
              <input
                value={form.title}
                onChange={(e) => setForm({ ...form, title: e.target.value })}
                aria-label="Form title"
                className="cib-display w-full bg-transparent text-3xl leading-tight mb-1 border-0"
                style={{ color: "var(--spruce)" }}
              />
              <input
                value={form.subtitle || ""}
                onChange={(e) => setForm({ ...form, subtitle: e.target.value })}
                aria-label="Form subtitle"
                className="cib-body w-full bg-transparent text-sm mb-4 border-0"
                style={{ color: "var(--ink-soft)" }}
              />
              <p className="text-sm mb-4" style={{ color: "var(--ink-soft)" }}>
                {askable.length} items loaded. Edit questions, scale labels, or categories below.
                {saveState === "saved" && <span style={{ color: "var(--moss)" }}> Saved.</span>}
                {saveState === "off" && <span> Saving is off here.</span>}
              </p>

              <button
                onClick={startFill}
                disabled={askable.length === 0}
                className="w-full rounded-2xl py-4 text-lg font-bold shadow-lg mb-6 transition-transform active:scale-[0.98]"
                style={askable.length === 0 ? { background: "var(--mist)", color: "var(--ink-soft)" } : { background: "var(--spruce)", color: "var(--cream-on-dark)" }}
              >
                Hand it over · {askable.length} items
              </button>

              {showDisclaimer && (
                <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex justify-between items-start mb-2">
                    <Eyebrow>About this instrument</Eyebrow>
                    <button onClick={() => setShowDisclaimer(false)} className="text-sm" style={{ color: "var(--ink-soft)" }}>✕</button>
                  </div>
                  <p className="text-xs mb-2" style={{ color: "var(--ink-soft)" }}>
                    The Parenting Stress Index, 4th Edition, Short Form (PSI-4-SF) is a copyrighted
                    instrument published by Psychological Assessment Resources, Inc. This app records
                    responses only. Scoring interpretation, and clinical decisions must follow the
                    official manual and materials.
                  </p>
                  <p className="text-xs" style={{ color: "var(--ink-soft)" }}>
                    <strong>Subscales:</strong> Parent Distress (PD) · Parent-Child Dysfunctional
                    Interaction (PCDI) · Difficult Child (DC). Raw totals are shown below; convert
                    to standard scores using the official profile.
                  </p>
                </div>
              )}

              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Answer scale</Eyebrow>
                <p className="text-xs mb-3" style={{ color: "var(--ink-soft)" }}>
                  Strongly Agree scores highest ({form.scale.length - 1 + (form.scaleStart || 1)}),
                  Strongly Disagree scores lowest ({form.scaleStart || 1}).
                </p>
                {form.scale.map((label, i) => (
                  <div key={i} className="flex items-center gap-2 mb-2">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{ background: "var(--mist)", color: "var(--spruce)" }}>
                      {form.scale.length - 1 - i + (form.scaleStart || 1)}
                    </span>
                    <input
                      value={label}
                      onChange={(e) => updateScaleLabel(i, e.target.value)}
                      aria-label={"Scale option " + i}
                      className="flex-1 rounded-lg px-3 py-2 text-sm border"
                      style={{ borderColor: "var(--mist)", background: "var(--paper)" }}
                    />
                    <button onClick={() => removeScaleLabel(i)} aria-label={"Remove " + i} className="w-8 h-8 rounded-lg text-sm flex-shrink-0" style={{ color: "var(--ink-soft)", background: "transparent" }}>✕</button>
                  </div>
                ))}
                {form.scale.length < 7 && (
                  <button onClick={addScaleLabel} className="text-sm font-bold mt-1" style={{ color: "var(--moss)" }}>+ Add option</button>
                )}
              </div>

              <Eyebrow>Questions</Eyebrow>
              {form.questions.map((q, i) => (
                <div key={q.id} className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex items-start justify-between mb-2">
                    <span className="cib-display text-lg" style={{ color: "var(--moss)" }}>{i + 1}</span>
                    <div className="flex gap-1">
                      <button onClick={() => moveQuestion(q.id, -1)} aria-label="Move up" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↑</button>
                      <button onClick={() => moveQuestion(q.id, 1)} aria-label="Move down" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↓</button>
                      <button onClick={() => removeQuestion(q.id)} aria-label="Delete" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--ink-soft)" }}>✕</button>
                    </div>
                  </div>
                  <textarea
                    value={q.text}
                    onChange={(e) => updateQuestion(q.id, { text: e.target.value })}
                    placeholder="Write your question here"
                    rows={2}
                    aria-label={"Question " + (i + 1)}
                    className="w-full rounded-lg px-3 py-2 text-base border mb-3 resize-none border-[#E4E9E2]"
                    style={{ background: "var(--paper)", color: "var(--ink)" }}
                  />
                  <div className="flex gap-2 mb-3">
                    <button
                      onClick={() => updateQuestion(q.id, { type: "scale", choices: undefined })}
                      className="flex-1 rounded-lg py-2 text-sm font-bold transition-all"
                      style={q.type === "scale" ? { background: "var(--spruce)", color: "var(--cream-on-dark)" } : { background: "var(--paper)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}
                    >Scale</button>
                    <button
                      onClick={() => updateQuestion(q.id, { type: "text" })}
                      className="flex-1 rounded-lg py-2 text-sm font-bold transition-all"
                      style={q.type === "text" ? { background: "var(--spruce)", color: "var(--cream-on-dark)" } : { background: "var(--paper)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}
                    >Open answer</button>
                    <button
                      onClick={() => updateQuestion(q.id, { type: "choice" })}
                      className="flex-1 rounded-lg py-2 text-sm font-bold transition-all"
                      style={q.type === "choice" ? { background: "var(--spruce)", color: "var(--cream-on-dark)" } : { background: "var(--paper)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}
                    >Custom</button>
                  </div>
                  {q.type === "choice" && (
                    <div className="mb-3">
                      <p className="text-xs mb-2" style={{ color: "var(--ink-soft)" }}>Choices (score shown in parentheses):</p>
                      {(q.choices || []).map((c, ci) => (
                        <div key={ci} className="flex items-center gap-2 mb-2">
                          <span className="text-xs font-bold w-6 text-center" style={{ color: "var(--moss)" }}>{c.score}</span>
                          <input
                            value={c.label}
                            onChange={(e) => {
                              const newChoices = [...(q.choices || [])];
                              newChoices[ci] = { ...c, label: e.target.value };
                              updateQuestion(q.id, { choices: newChoices });
                            }}
                            className="flex-1 rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]"
                            style={{ background: "var(--paper)" }}
                          />
                        </div>
                      ))}
                    </div>
                  )}
                  <input
                    value={q.category}
                    onChange={(e) => updateQuestion(q.id, { category: e.target.value })}
                    placeholder="Subscale / category"
                    aria-label={"Question " + (i + 1) + " category"}
                    className="w-full rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]"
                    style={{ background: "var(--paper)" }}
                  />
                  {existingCategories.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-2">
                      {existingCategories.map((c) => (
                        <button key={c} onClick={() => updateQuestion(q.id, { category: c })} className="text-xs px-2 py-1 rounded-full transition-colors hover:bg-[#c3d1c8]" style={{ background: "var(--mist)", color: "var(--spruce)" }}>{c}</button>
                      ))}
                    </div>
                  )}
                </div>
              ))}

              <button onClick={addQuestion} className="w-full rounded-2xl py-3 text-base font-bold mb-3 transition-colors hover:bg-[#fcfbf9]" style={{ background: "var(--card)", color: "var(--spruce)", border: "2px dashed var(--moss)" }}>
                + Add a question
              </button>

              <button onClick={resetToPSI} className="w-full py-2 text-sm transition-colors hover:text-opacity-80" style={{ color: confirmReset ? "var(--alert)" : "var(--ink-soft)" }}>
                {confirmReset ? "Tap again to restore PSI-4-SF defaults" : "Restore PSI-4-SF defaults"}
              </button>
            </div>
          </div>
        );
      }

      // ─── FILL MODE ───
      if (mode === "fill" && current) {
        const progress = ((idx + 1) / askable.length) * 100;
        const value = answers[current.id];
        const canAdvance = value !== undefined && value !== null && !(typeof value === "string" && value.trim().length === 0);
        return (
          <div className="cib-body cib-drift-bg min-h-screen w-full flex flex-col animate-[cibFade_320ms_ease_both]" style={{ color: "var(--ink)" }}>
            <style>{FONT_CSS_PSI}</style>
            <div className="max-w-md mx-auto w-full px-5 pt-6 pb-8 flex flex-col flex-1">
              <div className="mb-8">
                <div className="flex justify-between items-baseline mb-2">
                  <span className="text-sm" style={{ color: "var(--ink-soft)" }}>{form.title}</span>
                  <span className="text-sm flex items-center gap-1.5" style={{ color: "var(--ink-soft)" }}>
                    <span key={current.id} className="cib-new-question-cue inline-block w-1.5 h-1.5 rounded-full" style={{ background: "var(--lamplight-deep)" }} />
                    {idx + 1} of {askable.length}
                  </span>
                </div>
                <div className="h-1 rounded-full w-full" style={{ background: "rgba(34,49,44,0.10)" }}>
                  <div className="h-1 rounded-full" style={{ width: progress + "%", background: "var(--lamplight)", transition: "width 300ms ease" }} />
                </div>
              </div>

              <div key={current.id} className="cib-fade flex-1 flex flex-col">
                <h1 className="cib-display text-2xl leading-snug mb-8" style={{ color: "var(--ink)" }}>
                  {current.text}
                </h1>

                {current.type === "scale" ? (
                  <div className="flex flex-col gap-3">
                    {form.scale.map((label, i) => {
                      const selected = value === i;
                      return (
                        <button
                          key={i}
                          onClick={() => setAnswers({ ...answers, [current.id]: i })}
                          className="w-full rounded-2xl py-4 px-5 text-left text-base font-bold transition-all active:scale-[0.99]"
                          style={selected
                            ? { background: "var(--lamplight)", color: "var(--spruce-deep)", boxShadow: "0 0 0 3px rgba(242,182,83,0.35)" }
                            : { background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }
                          }
                        >
                          {label}
                        </button>
                      );
                    })}
                  </div>
                ) : current.type === "choice" && Array.isArray(current.choices) ? (
                  <div className="flex flex-col gap-3">
                    {current.choices.map((choice, i) => {
                      const selected = value === i;
                      return (
                        <button
                          key={i}
                          onClick={() => setAnswers({ ...answers, [current.id]: i })}
                          className="w-full rounded-2xl py-4 px-5 text-left text-base font-bold transition-all active:scale-[0.99]"
                          style={selected
                            ? { background: "var(--lamplight)", color: "var(--spruce-deep)", boxShadow: "0 0 0 3px rgba(242,182,83,0.35)" }
                            : { background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }
                          }
                        >
                          {choice.label}
                        </button>
                      );
                    })}
                  </div>
                ) : (
                  <textarea
                    value={typeof value === "string" ? value : ""}
                    onChange={(e) => setAnswers({ ...answers, [current.id]: e.target.value })}
                    placeholder="Whatever comes to mind is fine here."
                    rows={5}
                    aria-label="Your answer"
                    className="w-full rounded-2xl p-4 text-base resize-none focus:outline-none"
                    style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}
                  />
                )}
              </div>

              <div className="mt-8">
                {!canAdvance && (
                  <p className="text-sm mb-3 text-center" style={{ color: "var(--ink-soft)" }}>
                    Select a response to continue.
                  </p>
                )}
                <div className="flex gap-3">
                  <button onClick={back} className="rounded-2xl py-4 px-6 text-base font-bold transition-colors hover:bg-black/5" style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}>
                    Back
                  </button>
                  <button
                    onClick={next}
                    disabled={!canAdvance}
                    aria-disabled={!canAdvance}
                    className="flex-1 rounded-2xl py-4 text-base font-bold transition-all"
                    style={canAdvance
                      ? { background: "var(--spruce)", color: "var(--cream-on-dark)" }
                      : { background: "rgba(34,49,44,0.10)", color: "rgba(34,49,44,0.35)", cursor: "not-allowed" }
                    }
                  >
                    {idx + 1 >= askable.length ? "Finish" : "Next"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─── DONE / RESULTS ───
      const totals = categoryTotals();
      const totalKeys = Object.keys(totals);
      const answeredCount = askable.filter((q) => answers[q.id] !== undefined).length;

      return (
        <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
          <style>{FONT_CSS_PSI}</style>
          <div className="max-w-md mx-auto px-4 py-8 cib-fade">
            <Eyebrow>All done</Eyebrow>
            <h1 className="cib-display text-3xl mb-2" style={{ color: "var(--spruce)" }}>Thank you.</h1>
            <p className="text-sm mb-6" style={{ color: "var(--ink-soft)" }}>
              {answeredCount} of {askable.length} items answered. Answers live only on this screen.
              Copy them before you close or start over.
            </p>

            <DataEntryCard groups={dataEntryGroups()} dateStr={new Date().toLocaleDateString()} title={form.title} />

            {totalKeys.length > 0 && (
              <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
                <Eyebrow dark>Raw subscale totals</Eyebrow>
                {totalKeys.map((k) => (
                  <div key={k} className="flex justify-between items-baseline mb-2">
                    <span className="font-bold text-sm">{k}</span>
                    <span className="cib-display text-xl">
                      {totals[k].sum}
                      <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}> / {totals[k].max}</span>
                    </span>
                  </div>
                ))}
                <p className="text-xs mt-3" style={{ color: "var(--soft-on-dark)" }}>
                  These are raw scores. Convert to standard scores and percentiles using the official PSI-4-SF manual and profile.
                </p>
              </div>
            )}

            <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              {askable.map((q, i) => {
                const score = getScore(q);
                let a = "Skipped";
                if (score !== null) {
                  if (q.type === "choice" && Array.isArray(q.choices)) a = q.choices[answers[q.id]]?.label;
                  else if (q.type === "scale") a = form.scale[answers[q.id]];
                  else if (q.type === "text" && typeof answers[q.id] === "string") a = answers[q.id].trim();
                } else if (q.type === "text" && typeof answers[q.id] === "string" && answers[q.id].trim()) {
                  a = answers[q.id].trim();
                }
                return (
                  <div key={q.id} className="py-3" style={i < askable.length - 1 ? { borderBottom: "1px solid var(--mist)" } : {}}>
                    <div className="flex justify-between items-start gap-2">
                      <div className="text-sm" style={{ color: "var(--ink-soft)" }}>{i + 1}. {q.text}</div>
                      {score !== null && <div className="text-xs font-bold flex-shrink-0" style={{ color: "var(--moss)" }}>{score}</div>}
                    </div>
                    <div className="font-bold mt-1" style={{ color: "var(--spruce)" }}>{a}</div>
                  </div>
                );
              })}
            </div>

            <div className="flex gap-3 mb-3">
              <button onClick={copySummary} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
                {copied ? "Copied" : "Copy answers"}
              </button>
              <button onClick={exportPDF} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--lamplight-deep)", color: "var(--spruce-deep)" }}>
                Export PDF
              </button>
            </div>
            <div className="flex gap-3">
              <button onClick={startFill} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                New check-in
              </button>
              <button onClick={() => setMode("build")} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                Back to builder
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // Component 2: PKBS-2 Response Recorder
    // ─────────────────────────────────────────────────────────────
    function PKBS2Recorder({ onBack }) {
      const [form, setForm] = useState(pkbsForm);
      const [mode, setMode] = useState("build"); // build | fill | done
      const [answers, setAnswers] = useState({});
      const [idx, setIdx] = useState(0);
      const [saveState, setSaveState] = useState("idle");
      const [copied, setCopied] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);
      const [showDisclaimer, setShowDisclaimer] = useState(true);
      const [raterInfo, setRaterInfo] = useState({ childName: "", ageYears: "", ageMonths: "", sex: "", ratedBy: "", relationship: "", date: "", setting: "" });
      const [activeScaleFilter, setActiveScaleFilter] = useState("all"); // all | social | problem
      const loadedRef = useRef(false);

      // Load saved form
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            if (!window.storage) {
              if (alive) setSaveState("off");
              loadedRef.current = true;
              return;
            }
            const result = await window.storage.get(FORM_STORAGE_KEY_PKBS);
            if (alive && result && result.value) {
              const parsed = JSON.parse(result.value);
              if (parsed && Array.isArray(parsed.questions)) setForm(parsed);
            }
          } catch (e) {
            // ignore
          } finally {
            loadedRef.current = true;
          }
        })();
        return () => { alive = false; };
      }, []);

      // Persist form
      useEffect(() => {
        if (!loadedRef.current) return;
        let cancelled = false;
        const t = setTimeout(async () => {
          try {
            if (!window.storage) return;
            await window.storage.set(FORM_STORAGE_KEY_PKBS, JSON.stringify(form));
            if (!cancelled) {
              setSaveState("saved");
              setTimeout(() => { if (!cancelled) setSaveState("idle"); }, 1500);
            }
          } catch (e) {
            if (!cancelled) setSaveState("off");
          }
        }, 600);
        return () => { cancelled = true; clearTimeout(t); };
      }, [form]);

      // ─── editing helpers ───
      const updateQuestion = (id, patch) => {
        setForm((f) => ({
          ...f,
          questions: f.questions.map((q) => (q.id === id ? { ...q, ...patch } : q)),
        }));
      };
      const addQuestion = () => {
        setForm((f) => ({
          ...f,
          questions: [...f.questions, { id: newId(), text: "", type: "scale", category: "" }],
        }));
      };
      const removeQuestion = (id) => {
        setForm((f) => ({ ...f, questions: f.questions.filter((q) => q.id !== id) }));
      };
      const moveQuestion = (id, dir) => {
        setForm((f) => {
          const qs = [...f.questions];
          const i = qs.findIndex((q) => q.id === id);
          const j = i + dir;
          if (i < 0 || j < 0 || j >= qs.length) return f;
          [qs[i], qs[j]] = [qs[j], qs[i]];
          return { ...f, questions: qs };
        });
      };
      const updateScaleLabel = (i, value) => {
        setForm((f) => {
          const scale = [...f.scale];
          scale[i] = value;
          return { ...f, scale };
        });
      };
      const addScaleLabel = () => {
        setForm((f) => (f.scale.length >= 7 ? f : { ...f, scale: [...f.scale, "New option"] }));
      };
      const removeScaleLabel = (i) => {
        setForm((f) => (f.scale.length <= 2 ? f : { ...f, scale: f.scale.filter((_, k) => k !== i) }));
      };
      const resetToPKBS = () => {
        if (!confirmReset) {
          setConfirmReset(true);
          setTimeout(() => setConfirmReset(false), 3000);
          return;
        }
        setConfirmReset(false);
        setForm(pkbsForm());
        setAnswers({});
      };

      // Filter questions by scale for fill mode
      const getFilteredQuestions = () => {
        const askable = form.questions.filter((q) => q.text.trim().length > 0);
        if (activeScaleFilter === "social") {
          return askable.filter((q) =>
            ["Social Cooperation", "Social Interaction", "Social Independence"].includes(q.category)
          );
        }
        if (activeScaleFilter === "problem") {
          return askable.filter((q) =>
            ["Externalizing Problems", "Internalizing Problems"].includes(q.category)
          );
        }
        return askable;
      };

      const askable = getFilteredQuestions();

      // ─── scoring ───
      const getScore = (q) => {
        const v = answers[q.id];
        if (v === undefined || v === null) return null;
        if (q.type === "scale" && typeof v === "number") {
          const start = typeof form.scaleStart === "number" ? form.scaleStart : 0;
          return v + start; // index 0 = start score
        }
        return null;
      };

      const categoryTotals = () => {
        const totals = {};
        askable.forEach((q) => {
          if (!q.category) return;
          const score = getScore(q);
          if (score === null) return;
          if (!totals[q.category]) totals[q.category] = { sum: 0, n: 0, max: 0 };
          totals[q.category].sum += score;
          totals[q.category].n += 1;
          totals[q.category].max += (form.scale.length - 1) + (form.scaleStart || 0);
        });
        const socialKeys = ["Social Cooperation", "Social Interaction", "Social Independence"];
        const problemKeys = ["Externalizing Problems", "Internalizing Problems"];
        const socialItems = socialKeys.filter((k) => totals[k]);
        const problemItems = problemKeys.filter((k) => totals[k]);
        if (socialItems.length) {
          let sum = 0, n = 0, max = 0;
          socialItems.forEach((k) => { sum += totals[k].sum; n += totals[k].n; max += totals[k].max; });
          totals["Social Skills Composite"] = { sum, n, max };
        }
        if (problemItems.length) {
          let sum = 0, n = 0, max = 0;
          problemItems.forEach((k) => { sum += totals[k].sum; n += totals[k].n; max += totals[k].max; });
          totals["Problem Behavior Composite"] = { sum, n, max };
        }
        return totals;
      };

      // ─── fill mode ───
      const startFill = () => {
        if (askable.length === 0) return;
        setAnswers({});
        setIdx(0);
        setCopied(false);
        setMode("fill");
      };
      const current = askable[idx];
      const next = () => {
        if (idx + 1 >= askable.length) setMode("done");
        else setIdx(idx + 1);
      };
      const back = () => {
        if (idx === 0) setMode("build");
        else setIdx(idx - 1);
      };

      // ─── results helpers ───
      // The PKBS is presented grouped by subscale, but the Child First
      // program numbers Social Skills 1–34 and Problem Behavior 1–42 in the
      // instrument's official order — which is encoded in the ids (ss.. / pb..).
      // Regroup and renumber by that order so "Item N" here matches the program.
      const PKBS_PAGE_LABELS = { ss: "Page 1 — Social Skills (Items 1–34)", pb: "Page 2 — Problem Behavior (Items 1–42)" };
      const dataEntryGroups = () => buildDataEntryGroups(form, getScore, PKBS_PAGE_LABELS);

      const summaryText = () => {
        const dateStr = raterInfo.date || new Date().toLocaleDateString();
        const lines = [
          dataEntryText(form, dataEntryGroups(), dateStr),
          "",
          "─────",
          "",
          form.title + " — " + form.subtitle,
          "Date: " + dateStr,
          "Child: " + (raterInfo.childName || "(not provided)"),
          "Age: " + (raterInfo.ageYears || "?") + "y " + (raterInfo.ageMonths || "?") + "m  |  Sex: " + (raterInfo.sex || "?"),
          "Rated by: " + (raterInfo.ratedBy || "(not provided)") + " (" + (raterInfo.relationship || "?") + ")",
          "Setting: " + (raterInfo.setting || "(not provided)"),
          "",
        ];
        askable.forEach((q, i) => {
          const score = getScore(q);
          let a = "(skipped)";
          if (score !== null) a = form.scale[answers[q.id]] + " (" + score + ")";
          lines.push((i + 1) + ". " + q.text);
          lines.push("   " + a);
        });
        const totals = categoryTotals();
        const keys = Object.keys(totals);
        if (keys.length) {
          lines.push("");
          lines.push("Raw Subscale Totals");
          keys.forEach((k) => {
            lines.push(k + ": " + totals[k].sum + " of " + totals[k].max + " (" + totals[k].n + " items)");
          });
        }
        return lines.join("\n");
      };

      const copySummary = async () => {
        const text = summaryText();
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
        } catch (e) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setCopied(true);
          } catch (err) {
            setCopied(false);
          }
        }
        setTimeout(() => setCopied(false), 2000);
      };

      const exportPDF = () => {
        const slug = (form.title || "assessment").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        exportTextToPDF(
          slug + "-" + new Date().toISOString().slice(0, 10) + ".pdf",
          form.title + (form.subtitle ? " — " + form.subtitle : ""),
          summaryText()
        );
      };

      const Eyebrow = ({ children, dark }) => (
        <div className="cib-body text-xs font-bold uppercase tracking-widest mb-2" style={{ color: dark ? "var(--soft-on-dark)" : "var(--moss)", letterSpacing: "0.14em" }}>
          {children}
        </div>
      );

      const existingCategories = Array.from(new Set(form.questions.map((q) => q.category).filter(Boolean)));

      const socialSkillsCount = form.questions.filter((q) =>
        ["Social Cooperation", "Social Interaction", "Social Independence"].includes(q.category)
      ).length;
      const problemBehaviorCount = form.questions.filter((q) =>
        ["Externalizing Problems", "Internalizing Problems"].includes(q.category)
      ).length;

      // ─── BUILD MODE ───
      if (mode === "build") {
        return (
          <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
            <style>{FONT_CSS_PKBS}</style>
            <div className="max-w-md mx-auto px-4 pb-12 pt-8">

              {/* Back to Dashboard Banner */}
              <div className="flex justify-between items-center mb-6">
                <button onClick={onBack} className="text-xs font-bold uppercase tracking-wider transition-colors hover:text-[#7FA08C]" style={{ color: "var(--ink-soft)" }}>
                  &larr; Back to Dashboard
                </button>
              </div>

              <Eyebrow>PKBS-2 Recorder</Eyebrow>
              <input
                value={form.title}
                onChange={(e) => setForm({ ...form, title: e.target.value })}
                aria-label="Form title"
                className="cib-display w-full bg-transparent text-3xl leading-tight mb-1 border-0"
                style={{ color: "var(--spruce)" }}
              />
              <input
                value={form.subtitle || ""}
                onChange={(e) => setForm({ ...form, subtitle: e.target.value })}
                aria-label="Form subtitle"
                className="cib-body w-full bg-transparent text-sm mb-4 border-0"
                style={{ color: "var(--ink-soft)" }}
              />
              <p className="text-sm mb-4" style={{ color: "var(--ink-soft)" }}>
                {socialSkillsCount} Social Skills items · {problemBehaviorCount} Problem Behavior items.
                {saveState === "saved" && <span style={{ color: "var(--moss)" }}> Saved.</span>}
                {saveState === "off" && <span> Saving is off here.</span>}
              </p>

              <button
                onClick={startFill}
                disabled={askable.length === 0}
                className="w-full rounded-2xl py-4 text-lg font-bold shadow-lg mb-6 transition-transform active:scale-[0.98]"
                style={askable.length === 0 ? { background: "var(--mist)", color: "var(--ink-soft)" } : { background: "var(--spruce)", color: "var(--cream-on-dark)" }}
              >
                Hand it over · {askable.length} items
              </button>

              {showDisclaimer && (
                <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex justify-between items-start mb-2">
                    <Eyebrow>About this instrument</Eyebrow>
                    <button onClick={() => setShowDisclaimer(false)} className="text-sm" style={{ color: "var(--ink-soft)" }}>✕</button>
                  </div>
                  <p className="text-xs mb-2" style={{ color: "var(--ink-soft)" }}>
                    The Preschool and Kindergarten Behavior Scales — 2nd Edition (PKBS-2) is a
                    copyrighted instrument published by PRO-ED, Inc. This app records responses only.
                    Scoring, interpretation, and clinical decisions must follow the official manual.
                  </p>
                  <p className="text-xs" style={{ color: "var(--ink-soft)" }}>
                    <strong>Social Skills:</strong> Social Cooperation (SC) · Social Interaction (INT) · Social Independence (IND).{" "}
                    <strong>Problem Behavior:</strong> Externalizing Problems (EP) · Internalizing Problems (IP).
                    Raw totals are shown; convert to standard scores and percentiles using the official manual.
                  </p>
                </div>
              )}

              {/* Rater Info */}
              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Child & Rater Information</Eyebrow>
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <input value={raterInfo.childName} onChange={(e) => setRaterInfo({ ...raterInfo, childName: e.target.value })} placeholder="Child's name" className="col-span-2 rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                  <input value={raterInfo.ageYears} onChange={(e) => setRaterInfo({ ...raterInfo, ageYears: e.target.value.replace(/\D/g, "") })} placeholder="Age (years)" inputMode="numeric" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                  <input value={raterInfo.ageMonths} onChange={(e) => setRaterInfo({ ...raterInfo, ageMonths: e.target.value.replace(/\D/g, "") })} placeholder="Age (months)" inputMode="numeric" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                  <select value={raterInfo.sex} onChange={(e) => setRaterInfo({ ...raterInfo, sex: e.target.value })} className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }}>
                    <option value="">Sex</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                  </select>
                  <input value={raterInfo.date} onChange={(e) => setRaterInfo({ ...raterInfo, date: e.target.value })} placeholder="Date (YYYY-MM-DD)" type="date" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                </div>
                <input value={raterInfo.ratedBy} onChange={(e) => setRaterInfo({ ...raterInfo, ratedBy: e.target.value })} placeholder="Rated by" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <input value={raterInfo.relationship} onChange={(e) => setRaterInfo({ ...raterInfo, relationship: e.target.value })} placeholder="Relationship to child" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <input value={raterInfo.setting} onChange={(e) => setRaterInfo({ ...raterInfo, setting: e.target.value })} placeholder="Setting(s) observed" className="w-full rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
              </div>

              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Answer scale</Eyebrow>
                <p className="text-xs mb-3" style={{ color: "var(--ink-soft)" }}>
                  Rate based on observations during the past 3 months.
                </p>
                {form.scale.map((label, i) => (
                  <div key={i} className="flex items-center gap-2 mb-2">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{ background: "var(--mist)", color: "var(--spruce)" }}>
                      {i + (form.scaleStart || 0)}
                    </span>
                    <input
                      value={label}
                      onChange={(e) => updateScaleLabel(i, e.target.value)}
                      aria-label={"Scale option " + i}
                      className="flex-1 rounded-lg px-3 py-2 text-sm border"
                      style={{ borderColor: "var(--mist)", background: "var(--paper)" }}
                    />
                    <button onClick={() => removeScaleLabel(i)} aria-label={"Remove " + i} className="w-8 h-8 rounded-lg text-sm flex-shrink-0" style={{ color: "var(--ink-soft)", background: "transparent" }}>✕</button>
                  </div>
                ))}
                {form.scale.length < 7 && (
                  <button onClick={addScaleLabel} className="text-sm font-bold mt-1" style={{ color: "var(--moss)" }}>+ Add option</button>
                )}
              </div>

              <div className="flex gap-2 mb-4">
                <button onClick={() => setActiveScaleFilter("all")} className="flex-1 rounded-lg py-2 text-sm font-bold" style={activeScaleFilter === "all" ? { background: "var(--spruce)", color: "var(--cream-on-dark)" } : { background: "var(--card)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}>All items</button>
                <button onClick={() => setActiveScaleFilter("social")} className="flex-1 rounded-lg py-2 text-sm font-bold" style={activeScaleFilter === "social" ? { background: "var(--moss)", color: "var(--cream-on-dark)" } : { background: "var(--card)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}>Social Skills</button>
                <button onClick={() => setActiveScaleFilter("problem")} className="flex-1 rounded-lg py-2 text-sm font-bold" style={activeScaleFilter === "problem" ? { background: "var(--rose)", color: "var(--cream-on-dark)" } : { background: "var(--card)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}>Problem Behavior</button>
              </div>

              <Eyebrow>Questions</Eyebrow>
              {form.questions.length === 0 && (
                <div className="rounded-2xl p-6 text-center text-sm mb-4" style={{ background: "var(--card)", border: "1px dashed var(--moss)", color: "var(--ink-soft)" }}>
                  A blank page. Add your first question below.
                </div>
              )}
              {form.questions.map((q, i) => (
                <div key={q.id} className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex items-start justify-between mb-2">
                    <span className="cib-display text-lg" style={{ color: "var(--moss)" }}>{i + 1}</span>
                    <div className="flex gap-1">
                      <button onClick={() => moveQuestion(q.id, -1)} aria-label="Move up" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↑</button>
                      <button onClick={() => moveQuestion(q.id, 1)} aria-label="Move down" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↓</button>
                      <button onClick={() => removeQuestion(q.id)} aria-label="Delete" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--ink-soft)" }}>✕</button>
                    </div>
                  </div>
                  <textarea
                    value={q.text}
                    onChange={(e) => updateQuestion(q.id, { text: e.target.value })}
                    placeholder="Write your question here"
                    rows={2}
                    aria-label={"Question " + (i + 1)}
                    className="w-full rounded-lg px-3 py-2 text-base border mb-3 resize-none border-[#E4E9E2]"
                    style={{ background: "var(--paper)", color: "var(--ink)" }}
                  />
                  <div className="flex gap-2 mb-3">
                    <button onClick={() => updateQuestion(q.id, { type: "scale" })} className="flex-1 rounded-lg py-2 text-sm font-bold" style={q.type === "scale" ? { background: "var(--spruce)", color: "var(--cream-on-dark)" } : { background: "var(--paper)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}>Scale</button>
                    <button onClick={() => updateQuestion(q.id, { type: "text" })} className="flex-1 rounded-lg py-2 text-sm font-bold" style={q.type === "text" ? { background: "var(--spruce)", color: "var(--cream-on-dark)" } : { background: "var(--paper)", color: "var(--ink-soft)", border: "1px solid var(--mist)" }}>Open answer</button>
                  </div>
                  <input
                    value={q.category}
                    onChange={(e) => updateQuestion(q.id, { category: e.target.value })}
                    placeholder="Subscale / category"
                    aria-label={"Question " + (i + 1) + " category"}
                    className="w-full rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]"
                    style={{ background: "var(--paper)" }}
                  />
                  {existingCategories.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-2">
                      {existingCategories.map((c) => (
                        <button key={c} onClick={() => updateQuestion(q.id, { category: c })} className="text-xs px-2 py-1 rounded-full transition-colors hover:bg-[#c3d1c8]" style={{ background: "var(--mist)", color: "var(--spruce)" }}>{c}</button>
                      ))}
                    </div>
                  )}
                </div>
              ))}

              <button onClick={addQuestion} className="w-full rounded-2xl py-3 text-base font-bold mb-3 transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "2px dashed var(--moss)" }}>
                + Add a question
              </button>

              <button onClick={resetToPKBS} className="w-full py-2 text-sm transition-colors hover:text-opacity-80" style={{ color: confirmReset ? "var(--alert)" : "var(--ink-soft)" }}>
                {confirmReset ? "Tap again to restore PKBS-2 defaults" : "Restore PKBS-2 defaults"}
              </button>
            </div>
          </div>
        );
      }

      // ─── FILL MODE ───
      if (mode === "fill" && current) {
        const progress = ((idx + 1) / askable.length) * 100;
        const value = answers[current.id];
        const canAdvance = value !== undefined && value !== null && !(typeof value === "string" && value.trim().length === 0);
        const isSocial = ["Social Cooperation", "Social Interaction", "Social Independence"].includes(current.category);
        return (
          <div className="cib-body cib-drift-bg min-h-screen w-full flex flex-col animate-[cibFade_320ms_ease_both]" style={{ color: "var(--ink)" }}>
            <style>{FONT_CSS_PKBS}</style>
            <div className="max-w-md mx-auto w-full px-5 pt-6 pb-8 flex flex-col flex-1">
              <div className="mb-8">
                <div className="flex justify-between items-baseline mb-2">
                  <span className="text-sm" style={{ color: "var(--ink-soft)" }}>{form.title}</span>
                  <span className="text-sm flex items-center gap-1.5" style={{ color: "var(--ink-soft)" }}>
                    <span key={current.id} className="cib-new-question-cue inline-block w-1.5 h-1.5 rounded-full" style={{ background: "var(--lamplight-deep)" }} />
                    {idx + 1} of {askable.length}
                  </span>
                </div>
                <div className="h-1 rounded-full w-full" style={{ background: "rgba(34,49,44,0.10)" }}>
                  <div className="h-1 rounded-full" style={{ width: progress + "%", background: isSocial ? "var(--moss)" : "var(--lamplight)", transition: "width 300ms ease" }} />
                </div>
              </div>

              <div key={current.id} className="cib-fade flex-1 flex flex-col">
                <h1 className="cib-display text-2xl leading-snug mb-8" style={{ color: "var(--ink)" }}>
                  {current.text}
                </h1>

                {current.type === "scale" ? (
                  <div className="flex flex-col gap-3">
                    {form.scale.map((label, i) => {
                      const selected = value === i;
                      return (
                        <button
                          key={i}
                          onClick={() => setAnswers({ ...answers, [current.id]: i })}
                          className="w-full rounded-2xl py-4 px-5 text-left text-base font-bold transition-all active:scale-[0.99]"
                          style={selected
                            ? { background: "var(--lamplight)", color: "var(--spruce-deep)", boxShadow: "0 0 0 3px rgba(242,182,83,0.35)" }
                            : { background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }
                          }
                        >
                          <span className="inline-block w-6 text-center mr-2 opacity-60">{i + (form.scaleStart || 0)}</span>
                          {label}
                        </button>
                      );
                    })}
                  </div>
                ) : (
                  <textarea
                    value={typeof value === "string" ? value : ""}
                    onChange={(e) => setAnswers({ ...answers, [current.id]: e.target.value })}
                    placeholder="Whatever comes to mind is fine here."
                    rows={5}
                    aria-label="Your answer"
                    className="w-full rounded-2xl p-4 text-base resize-none focus:outline-none"
                    style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}
                  />
                )}
              </div>

              <div className="mt-8">
                {!canAdvance && (
                  <p className="text-sm mb-3 text-center" style={{ color: "var(--ink-soft)" }}>
                    Select a response to continue.
                  </p>
                )}
                <div className="flex gap-3">
                  <button onClick={back} className="rounded-2xl py-4 px-6 text-base font-bold transition-colors hover:bg-black/5" style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}>
                    Back
                  </button>
                  <button
                    onClick={next}
                    disabled={!canAdvance}
                    aria-disabled={!canAdvance}
                    className="flex-1 rounded-2xl py-4 text-base font-bold transition-all"
                    style={canAdvance
                      ? { background: "var(--spruce)", color: "var(--cream-on-dark)" }
                      : { background: "rgba(34,49,44,0.10)", color: "rgba(34,49,44,0.35)", cursor: "not-allowed" }
                    }
                  >
                    {idx + 1 >= askable.length ? "Finish" : "Next"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─── DONE / RESULTS ───
      const totals = categoryTotals();
      const totalKeys = Object.keys(totals);
      const answeredCount = askable.filter((q) => answers[q.id] !== undefined).length;

      return (
        <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
          <style>{FONT_CSS_PKBS}</style>
          <div className="max-w-md mx-auto px-4 py-8 cib-fade">
            <Eyebrow>All done</Eyebrow>
            <h1 className="cib-display text-3xl mb-2" style={{ color: "var(--spruce)" }}>Thank you.</h1>
            <p className="text-sm mb-6" style={{ color: "var(--ink-soft)" }}>
              {answeredCount} of {askable.length} items answered. Answers live only on this screen.
              Copy them before you close or start over.
            </p>

            <DataEntryCard groups={dataEntryGroups()} dateStr={raterInfo.date || new Date().toLocaleDateString()} title={form.title} />

            {/* Rater info summary */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              <Eyebrow>Child & Rater</Eyebrow>
              <div className="text-sm" style={{ color: "var(--ink-soft)" }}>
                <p><strong style={{ color: "var(--spruce)" }}>{raterInfo.childName || "(no name)"}</strong>{raterInfo.ageYears && ` · ${raterInfo.ageYears}y ${raterInfo.ageMonths || 0}m`}{raterInfo.sex && ` · ${raterInfo.sex}`}</p>
                <p>Rated by {raterInfo.ratedBy || "(not provided)"}{raterInfo.relationship && ` (${raterInfo.relationship})`}</p>
                <p>{raterInfo.date || new Date().toLocaleDateString()}{raterInfo.setting && ` · ${raterInfo.setting}`}</p>
              </div>
            </div>

            {totalKeys.length > 0 && (
              <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
                <Eyebrow dark>Raw subscale totals</Eyebrow>
                {totalKeys.map((k) => (
                  <div key={k} className="flex justify-between items-baseline mb-2">
                    <span className="font-bold text-sm">{k}</span>
                    <span className="cib-display text-xl">
                      {totals[k].sum}
                      <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}> / {totals[k].max}</span>
                    </span>
                  </div>
                ))}
                <p className="text-xs mt-3" style={{ color: "var(--soft-on-dark)" }}>
                  These are raw scores. Convert to standard scores and percentiles using the official PKBS-2 manual and profile. Separate tables exist for home-based and school-based raters.
                </p>
              </div>
            )}

            <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              {askable.map((q, i) => {
                const score = getScore(q);
                let a = "Skipped";
                if (score !== null) a = form.scale[answers[q.id]];
                return (
                  <div key={q.id} className="py-3" style={i < askable.length - 1 ? { borderBottom: "1px solid var(--mist)" } : {}}>
                    <div className="flex justify-between items-start gap-2">
                      <div className="text-sm" style={{ color: "var(--ink-soft)" }}>{i + 1}. {q.text}</div>
                      {score !== null && <div className="text-xs font-bold flex-shrink-0" style={{ color: "var(--moss)" }}>{score}</div>}
                    </div>
                    <div className="font-bold mt-1" style={{ color: "var(--spruce)" }}>{a}</div>
                  </div>
                );
              })}
            </div>

            <div className="flex gap-3 mb-3">
              <button onClick={copySummary} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
                {copied ? "Copied" : "Copy answers"}
              </button>
              <button onClick={exportPDF} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--lamplight-deep)", color: "var(--spruce-deep)" }}>
                Export PDF
              </button>
            </div>
            <div className="flex gap-3">
              <button onClick={startFill} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                New check-in
              </button>
              <button onClick={() => setMode("build")} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                Back to builder
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // Component 3: TESI-PRR Response Recorder
    // ─────────────────────────────────────────────────────────────
    function TESIPRRRecorder({ onBack }) {
      const [form, setForm] = useState(tesiForm);
      const [mode, setMode] = useState("build"); // build | fill | done
      const [answers, setAnswers] = useState({}); // id -> index (0=Yes,1=No,2=Unsure); id+"_desc" -> string
      const [idx, setIdx] = useState(0);
      const [saveState, setSaveState] = useState("idle");
      const [copied, setCopied] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);
      const [showDisclaimer, setShowDisclaimer] = useState(true);
      const [raterInfo, setRaterInfo] = useState({ childName: "", caregiverName: "", date: "" });
      const loadedRef = useRef(false);

      // Load saved form
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            if (!window.storage) {
              if (alive) setSaveState("off");
              loadedRef.current = true;
              return;
            }
            const result = await window.storage.get(FORM_STORAGE_KEY_TESI);
            if (alive && result && result.value) {
              const parsed = JSON.parse(result.value);
              if (parsed && Array.isArray(parsed.questions)) setForm(parsed);
            }
          } catch (e) {
            // ignore
          } finally {
            loadedRef.current = true;
          }
        })();
        return () => { alive = false; };
      }, []);

      // Persist form
      useEffect(() => {
        if (!loadedRef.current) return;
        let cancelled = false;
        const t = setTimeout(async () => {
          try {
            if (!window.storage) return;
            await window.storage.set(FORM_STORAGE_KEY_TESI, JSON.stringify(form));
            if (!cancelled) {
              setSaveState("saved");
              setTimeout(() => { if (!cancelled) setSaveState("idle"); }, 1500);
            }
          } catch (e) {
            if (!cancelled) setSaveState("off");
          }
        }, 600);
        return () => { cancelled = true; clearTimeout(t); };
      }, [form]);

      // ─── editing helpers ───
      const updateQuestion = (id, patch) => {
        setForm((f) => ({
          ...f,
          questions: f.questions.map((q) => (q.id === id ? { ...q, ...patch } : q)),
        }));
      };
      const addQuestion = () => {
        setForm((f) => ({
          ...f,
          questions: [...f.questions, { id: newId(), text: "", type: "yesno", category: "Trauma Exposure" }],
        }));
      };
      const removeQuestion = (id) => {
        setForm((f) => ({ ...f, questions: f.questions.filter((q) => q.id !== id) }));
      };
      const moveQuestion = (id, dir) => {
        setForm((f) => {
          const qs = [...f.questions];
          const i = qs.findIndex((q) => q.id === id);
          const j = i + dir;
          if (i < 0 || j < 0 || j >= qs.length) return f;
          [qs[i], qs[j]] = [qs[j], qs[i]];
          return { ...f, questions: qs };
        });
      };
      const resetToTESI = () => {
        if (!confirmReset) {
          setConfirmReset(true);
          setTimeout(() => setConfirmReset(false), 3000);
          return;
        }
        setConfirmReset(false);
        setForm(tesiForm());
        setAnswers({});
      };

      const askable = form.questions.filter((q) => q.text.trim().length > 0);

      // ─── scoring: count endorsed (Yes) and unsure ───
      const endorsedCount = askable.filter((q) => answers[q.id] === 0).length;
      const unsureCount = askable.filter((q) => answers[q.id] === 2).length;
      const noCount = askable.filter((q) => answers[q.id] === 1).length;

      // ─── fill mode ───
      const startFill = () => {
        if (askable.length === 0) return;
        setAnswers({});
        setIdx(0);
        setCopied(false);
        setMode("fill");
      };
      const current = askable[idx];
      const next = () => {
        if (idx + 1 >= askable.length) setMode("done");
        else setIdx(idx + 1);
      };
      const back = () => {
        if (idx === 0) setMode("build");
        else setIdx(idx - 1);
      };

      // ─── results helpers ───
      const summaryText = () => {
        const lines = [
          form.title + " — " + form.subtitle,
          "Date: " + (raterInfo.date || new Date().toLocaleDateString()),
          "Child: " + (raterInfo.childName || "(not provided)"),
          "Caregiver / informant: " + (raterInfo.caregiverName || "(not provided)"),
          "",
        ];
        askable.forEach((q, i) => {
          const v = answers[q.id];
          let a = "(skipped)";
          if (v === 0 || v === 1 || v === 2) a = form.scale[v];
          lines.push((i + 1) + ". " + q.text);
          lines.push("   " + a);
          if (q.describe) {
            const d = answers[q.id + "_desc"];
            if (typeof d === "string" && d.trim()) lines.push("   Describe: " + d.trim());
          }
        });
        lines.push("");
        lines.push("Events endorsed (Yes): " + endorsedCount + " of " + askable.length);
        lines.push("Unsure: " + unsureCount + "  |  No: " + noCount);
        lines.push("");
        lines.push("Note: A definitive PTSD Criterion A / A-2 trauma count requires the full interview and clinician judgment per the official TESI-PRR manual.");
        return lines.join("\n");
      };

      const copySummary = async () => {
        const text = summaryText();
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
        } catch (e) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setCopied(true);
          } catch (err) {
            setCopied(false);
          }
        }
        setTimeout(() => setCopied(false), 2000);
      };

      const exportPDF = () => {
        const slug = (form.title || "assessment").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        exportTextToPDF(
          slug + "-" + new Date().toISOString().slice(0, 10) + ".pdf",
          form.title + (form.subtitle ? " — " + form.subtitle : ""),
          summaryText()
        );
      };

      const Eyebrow = ({ children, dark }) => (
        <div className="cib-body text-xs font-bold uppercase tracking-widest mb-2" style={{ color: dark ? "var(--soft-on-dark)" : "var(--alert)", letterSpacing: "0.14em" }}>
          {children}
        </div>
      );

      // Yes = alert/terracotta; No = spruce; Unsure = muted
      const optionColor = (i, selected) => {
        if (!selected) {
          return { background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" };
        }
        if (i === 0) return { background: "var(--alert)", color: "var(--cream-on-dark)", boxShadow: "0 0 0 3px rgba(180,85,46,0.35)" };
