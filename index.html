        if (i === 1) return { background: "var(--spruce)", color: "var(--cream-on-dark)", boxShadow: "0 0 0 3px rgba(31,58,52,0.25)" };
        return { background: "var(--moss)", color: "var(--cream-on-dark)", boxShadow: "0 0 0 3px rgba(127,160,140,0.35)" };
      };

      // ─── BUILD MODE ───
      if (mode === "build") {
        return (
          <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
            <style>{FONT_CSS_TESI}</style>
            <div className="max-w-md mx-auto px-4 pb-12 pt-8">

              {/* Back to Dashboard Banner */}
              <div className="flex justify-between items-center mb-6">
                <button onClick={onBack} className="text-xs font-bold uppercase tracking-wider transition-colors hover:text-[#B4552E]" style={{ color: "var(--ink-soft)" }}>
                  &larr; Back to Dashboard
                </button>
              </div>

              <Eyebrow>TESI-PRR Recorder</Eyebrow>
              <input
                value={form.title}
                onChange={(e) => setForm({ ...form, title: e.target.value })}
                aria-label="Form title"
                className="cib-display w-full bg-transparent text-3xl leading-tight mb-1 border-0"
                style={{ color: "var(--spruce)" }}
              />
              <input
                value={form.subtitle || ""}
                onChange={(e) => setForm({ ...form, subtitle: e.target.value })}
                aria-label="Form subtitle"
                className="cib-body w-full bg-transparent text-sm mb-4 border-0"
                style={{ color: "var(--ink-soft)" }}
              />
              <p className="text-sm mb-4" style={{ color: "var(--ink-soft)" }}>
                {askable.length} screening items. Yes / No / Unsure per item.
                {saveState === "saved" && <span style={{ color: "var(--moss)" }}> Saved.</span>}
                {saveState === "off" && <span> Saving is off here.</span>}
              </p>

              <button
                onClick={startFill}
                disabled={askable.length === 0}
                className="w-full rounded-2xl py-4 text-lg font-bold shadow-lg mb-6 transition-transform active:scale-[0.98]"
                style={askable.length === 0 ? { background: "var(--mist)", color: "var(--ink-soft)" } : { background: "var(--spruce)", color: "var(--cream-on-dark)" }}
              >
                Begin interview · {askable.length} items
              </button>

              {showDisclaimer && (
                <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex justify-between items-start mb-2">
                    <Eyebrow>About this instrument</Eyebrow>
                    <button onClick={() => setShowDisclaimer(false)} className="text-sm" style={{ color: "var(--ink-soft)" }}>✕</button>
                  </div>
                  <p className="text-xs mb-2" style={{ color: "var(--ink-soft)" }}>
                    The Traumatic Events Screening Inventory — Parent Report Revised (TESI-PRR) probes a
                    child's history of exposure to potentially traumatic events and distinguishes these
                    from other negative life experiences. Ippen, Ford, Acker, Bosquet, Ellis, Schiffman,
                    Ribbe, Cone, Lukovitz, &amp; Edwards (2002), National Center for PTSD. This app
                    records responses only.
                  </p>
                  <p className="text-xs mb-2" style={{ color: "var(--ink-soft)" }}>
                    <strong>Administer as an interview.</strong> The TESI-PRR is a caregiver version for
                    children under 7 (usable with any age) and takes about 20–30 minutes. It should always
                    be administered as an interview, not self-completed.
                  </p>
                  <p className="text-xs" style={{ color: "var(--ink-soft)" }}>
                    The overall score sums items whose responses meet both Criterion A and Criterion A-2
                    for PTSD in the DSM-IV. This recorder tallies endorsed (Yes) items only; the
                    Criterion A / A-2 determination requires clinician judgment per the official manual.
                  </p>
                </div>
              )}

              {/* Caregiver / Child Info */}
              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Child & Caregiver Information</Eyebrow>
                <input value={raterInfo.childName} onChange={(e) => setRaterInfo({ ...raterInfo, childName: e.target.value })} placeholder="Child's name" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <input value={raterInfo.caregiverName} onChange={(e) => setRaterInfo({ ...raterInfo, caregiverName: e.target.value })} placeholder="Caregiver / informant name" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <input value={raterInfo.date} onChange={(e) => setRaterInfo({ ...raterInfo, date: e.target.value })} placeholder="Date" type="date" className="w-full rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
              </div>

              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Answer options</Eyebrow>
                <p className="text-xs mb-3" style={{ color: "var(--ink-soft)" }}>
                  Each item is answered Yes, No, or Unsure. A "Yes" counts as an endorsed event.
                </p>
                <div className="flex gap-2">
                  {form.scale.map((label, i) => (
                    <span key={i} className="flex-1 text-center rounded-lg py-2 text-sm font-bold" style={{ background: "var(--paper)", color: i === 0 ? "var(--alert)" : "var(--spruce)", border: "1px solid var(--mist)" }}>
                      {label}
                    </span>
                  ))}
                </div>
              </div>

              <Eyebrow>Items</Eyebrow>
              {form.questions.length === 0 && (
                <div className="rounded-2xl p-6 text-center text-sm mb-4" style={{ background: "var(--card)", border: "1px dashed var(--alert)", color: "var(--ink-soft)" }}>
                  A blank page. Add your first item below.
                </div>
              )}
              {form.questions.map((q, i) => (
                <div key={q.id} className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex items-start justify-between mb-2">
                    <span className="cib-display text-lg" style={{ color: "var(--alert)" }}>{i + 1}</span>
                    <div className="flex gap-1">
                      <button onClick={() => moveQuestion(q.id, -1)} aria-label="Move up" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↑</button>
                      <button onClick={() => moveQuestion(q.id, 1)} aria-label="Move down" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↓</button>
                      <button onClick={() => removeQuestion(q.id)} aria-label="Delete" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--ink-soft)" }}>✕</button>
                    </div>
                  </div>
                  <textarea
                    value={q.text}
                    onChange={(e) => updateQuestion(q.id, { text: e.target.value })}
                    placeholder="Write the screening prompt here"
                    rows={3}
                    aria-label={"Item " + (i + 1)}
                    className="w-full rounded-lg px-3 py-2 text-base border mb-3 resize-none border-[#E4E9E2]"
                    style={{ background: "var(--paper)", color: "var(--ink)" }}
                  />
                  <label className="flex items-center gap-2 text-sm" style={{ color: "var(--ink-soft)" }}>
                    <input
                      type="checkbox"
                      checked={!!q.describe}
                      onChange={(e) => updateQuestion(q.id, { describe: e.target.checked })}
                    />
                    Add a "describe" follow-up when answered Yes
                  </label>
                </div>
              ))}

              <button onClick={addQuestion} className="w-full rounded-2xl py-3 text-base font-bold mb-3 transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "2px dashed var(--alert)" }}>
                + Add an item
              </button>

              <button onClick={resetToTESI} className="w-full py-2 text-sm transition-colors hover:text-opacity-80" style={{ color: confirmReset ? "var(--alert)" : "var(--ink-soft)" }}>
                {confirmReset ? "Tap again to restore TESI-PRR defaults" : "Restore TESI-PRR defaults"}
              </button>
            </div>
          </div>
        );
      }

      // ─── FILL MODE ───
      if (mode === "fill" && current) {
        const progress = ((idx + 1) / askable.length) * 100;
        const value = answers[current.id];
        const canAdvance = value !== undefined && value !== null && !(typeof value === "string" && value.trim().length === 0);
        return (
          <div className="cib-body cib-drift-bg min-h-screen w-full flex flex-col animate-[cibFade_320ms_ease_both]" style={{ color: "var(--ink)" }}>
            <style>{FONT_CSS_TESI}</style>
            <div className="max-w-md mx-auto w-full px-5 pt-6 pb-8 flex flex-col flex-1">
              <div className="mb-8">
                <div className="flex justify-between items-baseline mb-2">
                  <span className="text-sm" style={{ color: "var(--ink-soft)" }}>{form.title}</span>
                  <span className="text-sm flex items-center gap-1.5" style={{ color: "var(--ink-soft)" }}>
                    <span key={current.id} className="cib-new-question-cue inline-block w-1.5 h-1.5 rounded-full" style={{ background: "var(--lamplight-deep)" }} />
                    {idx + 1} of {askable.length}
                  </span>
                </div>
                <div className="h-1 rounded-full w-full" style={{ background: "rgba(34,49,44,0.10)" }}>
                  <div className="h-1 rounded-full" style={{ width: progress + "%", background: "var(--alert)", transition: "width 300ms ease" }} />
                </div>
              </div>

              <div key={current.id} className="cib-fade flex-1 flex flex-col">
                <h1 className="cib-display text-2xl leading-snug mb-8" style={{ color: "var(--ink)" }}>
                  {current.text}
                </h1>

                <div className="flex flex-col gap-3">
                  {form.scale.map((label, i) => {
                    const selected = value === i;
                    return (
                      <button
                        key={i}
                        onClick={() => setAnswers({ ...answers, [current.id]: i })}
                        className="w-full rounded-2xl py-4 px-5 text-left text-base font-bold transition-all active:scale-[0.99]"
                        style={optionColor(i, selected)}
                      >
                        {label}
                      </button>
                    );
                  })}
                </div>

                {current.describe && value === 0 && (
                  <div className="mt-5">
                    <div className="text-sm mb-2" style={{ color: "var(--ink-soft)" }}>
                      {current.describePrompt || "If yes, briefly describe:"}
                    </div>
                    <textarea
                      value={typeof answers[current.id + "_desc"] === "string" ? answers[current.id + "_desc"] : ""}
                      onChange={(e) => setAnswers({ ...answers, [current.id + "_desc"]: e.target.value })}
                      placeholder="Brief description (optional)"
                      rows={4}
                      aria-label="Describe"
                      className="w-full rounded-2xl p-4 text-base resize-none focus:outline-none"
                      style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}
                    />
                  </div>
                )}
              </div>

              <div className="mt-8">
                {!canAdvance && (
                  <p className="text-sm mb-3 text-center" style={{ color: "var(--ink-soft)" }}>
                    Select a response to continue.
                  </p>
                )}
                <div className="flex gap-3">
                  <button onClick={back} className="rounded-2xl py-4 px-6 text-base font-bold transition-colors hover:bg-black/5" style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}>
                    Back
                  </button>
                  <button
                    onClick={next}
                    disabled={!canAdvance}
                    aria-disabled={!canAdvance}
                    className="flex-1 rounded-2xl py-4 text-base font-bold transition-all"
                    style={canAdvance
                      ? { background: "var(--spruce)", color: "var(--cream-on-dark)" }
                      : { background: "rgba(34,49,44,0.10)", color: "rgba(34,49,44,0.35)", cursor: "not-allowed" }
                    }
                  >
                    {idx + 1 >= askable.length ? "Finish" : "Next"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─── DONE / RESULTS ───
      const answeredCount = askable.filter((q) => answers[q.id] !== undefined).length;

      return (
        <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
          <style>{FONT_CSS_TESI}</style>
          <div className="max-w-md mx-auto px-4 py-8 cib-fade">
            <Eyebrow>All done</Eyebrow>
            <h1 className="cib-display text-3xl mb-2" style={{ color: "var(--spruce)" }}>Thank you.</h1>
            <p className="text-sm mb-6" style={{ color: "var(--ink-soft)" }}>
              {answeredCount} of {askable.length} items answered. Answers live only on this screen.
              Copy them before you close or start over.
            </p>

            {/* Child & caregiver summary */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              <Eyebrow>Child & Caregiver</Eyebrow>
              <div className="text-sm" style={{ color: "var(--ink-soft)" }}>
                <p><strong style={{ color: "var(--spruce)" }}>{raterInfo.childName || "(no name)"}</strong></p>
                <p>Informant: {raterInfo.caregiverName || "(not provided)"}</p>
                <p>{raterInfo.date || new Date().toLocaleDateString()}</p>
              </div>
            </div>

            <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
              <Eyebrow dark>Screening summary</Eyebrow>
              <div className="flex justify-between items-baseline mb-2">
                <span className="font-bold text-sm">Events endorsed (Yes)</span>
                <span className="cib-display text-xl">
                  {endorsedCount}
                  <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}> / {askable.length}</span>
                </span>
              </div>
              <div className="flex justify-between items-baseline mb-2">
                <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}>Unsure</span>
                <span className="cib-display text-lg">{unsureCount}</span>
              </div>
              <div className="flex justify-between items-baseline">
                <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}>No</span>
                <span className="cib-display text-lg">{noCount}</span>
              </div>
              <p className="text-xs mt-3" style={{ color: "var(--soft-on-dark)" }}>
                This is a count of endorsed events. The overall TESI-PRR score sums items meeting both
                Criterion A and A-2 for PTSD (DSM-IV) — a determination that requires the full interview
                and clinician judgment per the official manual.
              </p>
            </div>

            <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              {askable.map((q, i) => {
                const v = answers[q.id];
                let a = "Skipped";
                let aColor = "var(--spruce)";
                if (v === 0) { a = "Yes"; aColor = "var(--alert)"; }
                else if (v === 1) { a = "No"; }
                else if (v === 2) { a = "Unsure"; aColor = "var(--ink-soft)"; }
                const desc = answers[q.id + "_desc"];
                return (
                  <div key={q.id} className="py-3" style={i < askable.length - 1 ? { borderBottom: "1px solid var(--mist)" } : {}}>
                    <div className="flex justify-between items-start gap-2">
                      <div className="text-sm" style={{ color: "var(--ink-soft)" }}>{i + 1}. {q.text}</div>
                    </div>
                    <div className="font-bold mt-1" style={{ color: aColor }}>{a}</div>
                    {q.describe && typeof desc === "string" && desc.trim() && (
                      <div className="text-sm mt-1 italic" style={{ color: "var(--ink-soft)" }}>“{desc.trim()}”</div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="flex gap-3 mb-3">
              <button onClick={copySummary} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
                {copied ? "Copied" : "Copy answers"}
              </button>
              <button onClick={exportPDF} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--lamplight-deep)", color: "var(--spruce-deep)" }}>
                Export PDF
              </button>
            </div>
            <div className="flex gap-3">
              <button onClick={startFill} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                New interview
              </button>
              <button onClick={() => setMode("build")} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                Back to builder
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // Component 4: Short Sensory Profile Response Recorder
    // ─────────────────────────────────────────────────────────────
    function SSPRecorder({ onBack }) {
      const [form, setForm] = useState(sspForm);
      const [mode, setMode] = useState("build"); // build | fill | done
      const [answers, setAnswers] = useState({}); // id -> index (0..4) or "na"
      const [idx, setIdx] = useState(0);
      const [saveState, setSaveState] = useState("idle");
      const [copied, setCopied] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);
      const [showDisclaimer, setShowDisclaimer] = useState(true);
      const [useKey, setUseKey] = useState(true); // apply official scoring key / classifications
      const [showResultsHelp, setShowResultsHelp] = useState(true);
      const [raterInfo, setRaterInfo] = useState({ childName: "", birthDate: "", date: "", completedBy: "", relationship: "", providerName: "", discipline: "" });
      const loadedRef = useRef(false);

      // Load saved form
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            if (!window.storage) {
              if (alive) setSaveState("off");
              loadedRef.current = true;
              return;
            }
            const result = await window.storage.get(FORM_STORAGE_KEY_SSP);
            if (alive && result && result.value) {
              const parsed = JSON.parse(result.value);
              if (parsed && Array.isArray(parsed.questions)) setForm(parsed);
            }
          } catch (e) {
            // ignore
          } finally {
            loadedRef.current = true;
          }
        })();
        return () => { alive = false; };
      }, []);

      // Persist form
      useEffect(() => {
        if (!loadedRef.current) return;
        let cancelled = false;
        const t = setTimeout(async () => {
          try {
            if (!window.storage) return;
            await window.storage.set(FORM_STORAGE_KEY_SSP, JSON.stringify(form));
            if (!cancelled) {
              setSaveState("saved");
              setTimeout(() => { if (!cancelled) setSaveState("idle"); }, 1500);
            }
          } catch (e) {
            if (!cancelled) setSaveState("off");
          }
        }, 600);
        return () => { cancelled = true; clearTimeout(t); };
      }, [form]);

      // ─── editing helpers ───
      const updateQuestion = (id, patch) => {
        setForm((f) => ({
          ...f,
          questions: f.questions.map((q) => (q.id === id ? { ...q, ...patch } : q)),
        }));
      };
      const addQuestion = () => {
        setForm((f) => ({
          ...f,
          questions: [...f.questions, { id: newId(), text: "", type: "scale", category: "" }],
        }));
      };
      const removeQuestion = (id) => {
        setForm((f) => ({ ...f, questions: f.questions.filter((q) => q.id !== id) }));
      };
      const moveQuestion = (id, dir) => {
        setForm((f) => {
          const qs = [...f.questions];
          const i = qs.findIndex((q) => q.id === id);
          const j = i + dir;
          if (i < 0 || j < 0 || j >= qs.length) return f;
          [qs[i], qs[j]] = [qs[j], qs[i]];
          return { ...f, questions: qs };
        });
      };
      const updateScaleLabel = (i, value) => {
        setForm((f) => {
          const scale = [...f.scale];
          scale[i] = value;
          return { ...f, scale };
        });
      };
      const resetToSSP = () => {
        if (!confirmReset) {
          setConfirmReset(true);
          setTimeout(() => setConfirmReset(false), 3000);
          return;
        }
        setConfirmReset(false);
        setForm(sspForm());
        setAnswers({});
      };

      const askable = form.questions.filter((q) => q.text.trim().length > 0);

      // ─── scoring: Always=1 .. Never=5 (ascending) ───
      const getScore = (q) => {
        const v = answers[q.id];
        if (v === undefined || v === null || v === "na") return null;
        if (typeof v === "number") {
          const start = typeof form.scaleStart === "number" ? form.scaleStart : 1;
          return v + start;
        }
        return null;
      };

      // section totals keyed by category; tracks answered vs total for completeness
      const sectionTotals = () => {
        const totals = {};
        askable.forEach((q) => {
          const cat = q.category || "Uncategorized";
          if (!totals[cat]) totals[cat] = { sum: 0, n: 0, items: 0, missing: 0 };
          totals[cat].items += 1;
          const score = getScore(q);
          if (score === null) {
            totals[cat].missing += 1;
          } else {
            totals[cat].sum += score;
            totals[cat].n += 1;
          }
        });
        return totals;
      };

      // ─── fill mode ───
      const startFill = () => {
        if (askable.length === 0) return;
        setAnswers({});
        setIdx(0);
        setCopied(false);
        setMode("fill");
      };
      const current = askable[idx];
      const next = () => {
        if (idx + 1 >= askable.length) setMode("done");
        else setIdx(idx + 1);
      };
      const back = () => {
        if (idx === 0) setMode("build");
        else setIdx(idx - 1);
      };

      // classification lookup by section name (falls back to null when unknown)
      const keyFor = (name) => SSP_SECTIONS.find((s) => s.name === name) || null;

      // ─── results helpers ───
      const summaryText = () => {
        const lines = [
          form.title + " — " + form.subtitle,
          "Date: " + (raterInfo.date || new Date().toLocaleDateString()),
          "Child: " + (raterInfo.childName || "(not provided)") + "  |  Birth date: " + (raterInfo.birthDate || "?"),
          "Completed by: " + (raterInfo.completedBy || "(not provided)") + " (" + (raterInfo.relationship || "?") + ")",
          "Service provider: " + (raterInfo.providerName || "(not provided)") + " (" + (raterInfo.discipline || "?") + ")",
          "",
        ];
        askable.forEach((q, i) => {
          const v = answers[q.id];
          const score = getScore(q);
          let a = "(skipped)";
          if (v === "na") a = "X — not observed / N/A";
          else if (score !== null) a = form.scale[v] + " (" + score + ")";
          lines.push((i + 1) + ". " + q.text);
          lines.push("   " + a);
        });
        const totals = sectionTotals();
        lines.push("");
        lines.push("Section Raw Score Totals");
        let grand = 0, grandItems = 0, grandMissing = 0;
        SSP_SECTIONS.forEach((s) => {
          const t = totals[s.name];
          if (!t) return;
          grand += t.sum; grandItems += t.items; grandMissing += t.missing;
          let line = s.name + ": " + t.sum + " / " + s.max;
          if (useKey) {
            const cls = classifySSP(t.sum, s.typicalMin, s.probableMin);
            line += "  → " + cls + (t.missing ? " (incomplete: " + t.missing + " not scored)" : "");
          } else if (t.missing) {
            line += "  (incomplete: " + t.missing + " not scored)";
          }
          lines.push(line);
        });
        // any custom sections not in the official key
        Object.keys(totals).forEach((name) => {
          if (SSP_SECTIONS.find((s) => s.name === name)) return;
          const t = totals[name];
          grand += t.sum; grandItems += t.items; grandMissing += t.missing;
          lines.push(name + ": " + t.sum + " (" + t.n + " items)");
        });
        lines.push("");
        let totalLine = "Total: " + grand + " / " + SSP_TOTAL_KEY.max;
        if (useKey) {
          totalLine += "  → " + classifySSP(grand, SSP_TOTAL_KEY.typicalMin, SSP_TOTAL_KEY.probableMin);
        }
        if (grandMissing) totalLine += "  (" + grandMissing + " items not scored)";
        lines.push(totalLine);
        if (useKey) {
          lines.push("");
          lines.push("Classifications are norm-based (n = 1,037 children without disabilities). Verify against the official SSP summary sheet.");
        }
        return lines.join("\n");
      };

      const copySummary = async () => {
        const text = summaryText();
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
        } catch (e) {
          try {
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            setCopied(true);
          } catch (err) {
            setCopied(false);
          }
        }
        setTimeout(() => setCopied(false), 2000);
      };

      const exportPDF = () => {
        const slug = (form.title || "assessment").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        exportTextToPDF(
          slug + "-" + new Date().toISOString().slice(0, 10) + ".pdf",
          form.title + (form.subtitle ? " — " + form.subtitle : ""),
          summaryText()
        );
      };

      const Eyebrow = ({ children, dark }) => (
        <div className="cib-body text-xs font-bold uppercase tracking-widest mb-2" style={{ color: dark ? "var(--soft-on-dark)" : "var(--lamplight-deep)", letterSpacing: "0.14em" }}>
          {children}
        </div>
      );

      const existingCategories = Array.from(new Set(form.questions.map((q) => q.category).filter(Boolean)));

      // ─── BUILD MODE ───
      if (mode === "build") {
        return (
          <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
            <style>{FONT_CSS_SSP}</style>
            <div className="max-w-md mx-auto px-4 pb-12 pt-8">

              {/* Back to Dashboard Banner */}
              <div className="flex justify-between items-center mb-6">
                <button onClick={onBack} className="text-xs font-bold uppercase tracking-wider transition-colors hover:text-[#D99A2B]" style={{ color: "var(--ink-soft)" }}>
                  &larr; Back to Dashboard
                </button>
              </div>

              <Eyebrow>Short Sensory Profile</Eyebrow>
              <input
                value={form.title}
                onChange={(e) => setForm({ ...form, title: e.target.value })}
                aria-label="Form title"
                className="cib-display w-full bg-transparent text-3xl leading-tight mb-1 border-0"
                style={{ color: "var(--spruce)" }}
              />
              <input
                value={form.subtitle || ""}
                onChange={(e) => setForm({ ...form, subtitle: e.target.value })}
                aria-label="Form subtitle"
                className="cib-body w-full bg-transparent text-sm mb-4 border-0"
                style={{ color: "var(--ink-soft)" }}
              />
              <p className="text-sm mb-4" style={{ color: "var(--ink-soft)" }}>
                {askable.length} items across {existingCategories.length} sections.
                {saveState === "saved" && <span style={{ color: "var(--moss)" }}> Saved.</span>}
                {saveState === "off" && <span> Saving is off here.</span>}
              </p>

              <button
                onClick={startFill}
                disabled={askable.length === 0}
                className="w-full rounded-2xl py-4 text-lg font-bold shadow-lg mb-6 transition-transform active:scale-[0.98]"
                style={askable.length === 0 ? { background: "var(--mist)", color: "var(--ink-soft)" } : { background: "var(--spruce)", color: "var(--cream-on-dark)" }}
              >
                Hand it over · {askable.length} items
              </button>

              {showDisclaimer && (
                <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex justify-between items-start mb-2">
                    <Eyebrow>About this instrument</Eyebrow>
                    <button onClick={() => setShowDisclaimer(false)} className="text-sm" style={{ color: "var(--ink-soft)" }}>✕</button>
                  </div>
                  <p className="text-xs mb-2" style={{ color: "var(--ink-soft)" }}>
                    The Short Sensory Profile (from the Sensory Profile) is a copyrighted caregiver
                    questionnaire. This app records responses only. For an item you cannot comment on
                    (behavior not observed or not applicable), mark it "X — not observed" and it is left
                    out of the section total.
                  </p>
                  <p className="text-xs" style={{ color: "var(--ink-soft)" }}>
                    <strong>Score key:</strong> Always = 1, Frequently = 2, Occasionally = 3, Seldom = 4,
                    Never = 5. Lower section totals indicate more atypical performance. The optional
                    classifications (Typical Performance · Probable Difference · Definite Difference) are
                    norm-based and should be verified against the official summary sheet.
                  </p>
                </div>
              )}

              {/* Child / Rater Info */}
              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Child & Respondent Information</Eyebrow>
                <input value={raterInfo.childName} onChange={(e) => setRaterInfo({ ...raterInfo, childName: e.target.value })} placeholder="Child's name" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <input value={raterInfo.birthDate} onChange={(e) => setRaterInfo({ ...raterInfo, birthDate: e.target.value })} placeholder="Birth date" type="date" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                  <input value={raterInfo.date} onChange={(e) => setRaterInfo({ ...raterInfo, date: e.target.value })} placeholder="Date" type="date" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                </div>
                <input value={raterInfo.completedBy} onChange={(e) => setRaterInfo({ ...raterInfo, completedBy: e.target.value })} placeholder="Completed by" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <input value={raterInfo.relationship} onChange={(e) => setRaterInfo({ ...raterInfo, relationship: e.target.value })} placeholder="Relationship to child" className="w-full rounded-lg px-3 py-2 text-sm border mb-3 border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                <div className="grid grid-cols-2 gap-3">
                  <input value={raterInfo.providerName} onChange={(e) => setRaterInfo({ ...raterInfo, providerName: e.target.value })} placeholder="Service provider" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                  <input value={raterInfo.discipline} onChange={(e) => setRaterInfo({ ...raterInfo, discipline: e.target.value })} placeholder="Discipline" className="rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]" style={{ background: "var(--paper)" }} />
                </div>
              </div>

              {/* Scoring key toggle */}
              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Scoring</Eyebrow>
                <label className="flex items-start gap-3 cursor-pointer">
                  <input type="checkbox" checked={useKey} onChange={(e) => setUseKey(e.target.checked)} className="mt-1" />
                  <span className="text-sm" style={{ color: "var(--ink-soft)" }}>
                    <strong style={{ color: "var(--spruce)" }}>Apply the official scoring key.</strong> When on,
                    results classify each section total as Typical Performance, Probable Difference, or
                    Definite Difference using the manual's cut scores (for office use). When off, only raw
                    section totals are shown.
                  </span>
                </label>
              </div>

              <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>Answer scale</Eyebrow>
                <p className="text-xs mb-3" style={{ color: "var(--ink-soft)" }}>
                  Frequency of the behavior. Always scores {form.scaleStart || 1}; Never scores {(form.scale.length - 1) + (form.scaleStart || 1)}.
                </p>
                {form.scale.map((label, i) => (
                  <div key={i} className="flex items-center gap-2 mb-2">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style={{ background: "var(--mist)", color: "var(--spruce)" }}>
                      {i + (form.scaleStart || 1)}
                    </span>
                    <input
                      value={label}
                      onChange={(e) => updateScaleLabel(i, e.target.value)}
                      aria-label={"Scale option " + i}
                      className="flex-1 rounded-lg px-3 py-2 text-sm border"
                      style={{ borderColor: "var(--mist)", background: "var(--paper)" }}
                    />
                  </div>
                ))}
              </div>

              <Eyebrow>Items</Eyebrow>
              {form.questions.length === 0 && (
                <div className="rounded-2xl p-6 text-center text-sm mb-4" style={{ background: "var(--card)", border: "1px dashed var(--lamplight-deep)", color: "var(--ink-soft)" }}>
                  A blank page. Add your first item below.
                </div>
              )}
              {form.questions.map((q, i) => (
                <div key={q.id} className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                  <div className="flex items-start justify-between mb-2">
                    <span className="cib-display text-lg" style={{ color: "var(--lamplight-deep)" }}>{i + 1}</span>
                    <div className="flex gap-1">
                      <button onClick={() => moveQuestion(q.id, -1)} aria-label="Move up" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↑</button>
                      <button onClick={() => moveQuestion(q.id, 1)} aria-label="Move down" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--spruce)" }}>↓</button>
                      <button onClick={() => removeQuestion(q.id)} aria-label="Delete" className="w-8 h-8 rounded-lg text-sm" style={{ background: "var(--paper)", color: "var(--ink-soft)" }}>✕</button>
                    </div>
                  </div>
                  <textarea
                    value={q.text}
                    onChange={(e) => updateQuestion(q.id, { text: e.target.value })}
                    placeholder="Write the item here"
                    rows={2}
                    aria-label={"Item " + (i + 1)}
                    className="w-full rounded-lg px-3 py-2 text-base border mb-3 resize-none border-[#E4E9E2]"
                    style={{ background: "var(--paper)", color: "var(--ink)" }}
                  />
                  <input
                    value={q.category}
                    onChange={(e) => updateQuestion(q.id, { category: e.target.value })}
                    placeholder="Section"
                    aria-label={"Item " + (i + 1) + " section"}
                    className="w-full rounded-lg px-3 py-2 text-sm border border-[#E4E9E2]"
                    style={{ background: "var(--paper)" }}
                  />
                  {existingCategories.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-2">
                      {existingCategories.map((c) => (
                        <button key={c} onClick={() => updateQuestion(q.id, { category: c })} className="text-xs px-2 py-1 rounded-full transition-colors hover:bg-[#c3d1c8]" style={{ background: "var(--mist)", color: "var(--spruce)" }}>{c}</button>
                      ))}
                    </div>
                  )}
                </div>
              ))}

              <button onClick={addQuestion} className="w-full rounded-2xl py-3 text-base font-bold mb-3 transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "2px dashed var(--lamplight-deep)" }}>
                + Add an item
              </button>

              <button onClick={resetToSSP} className="w-full py-2 text-sm transition-colors hover:text-opacity-80" style={{ color: confirmReset ? "var(--alert)" : "var(--ink-soft)" }}>
                {confirmReset ? "Tap again to restore Short Sensory Profile defaults" : "Restore Short Sensory Profile defaults"}
              </button>
            </div>
          </div>
        );
      }

      // ─── FILL MODE ───
      if (mode === "fill" && current) {
        const progress = ((idx + 1) / askable.length) * 100;
        const value = answers[current.id];
        const canAdvance = value !== undefined && value !== null && !(typeof value === "string" && value.trim().length === 0);
        return (
          <div className="cib-body cib-drift-bg min-h-screen w-full flex flex-col animate-[cibFade_320ms_ease_both]" style={{ color: "var(--ink)" }}>
            <style>{FONT_CSS_SSP}</style>
            <div className="max-w-md mx-auto w-full px-5 pt-6 pb-8 flex flex-col flex-1">
              <div className="mb-8">
                <div className="flex justify-between items-baseline mb-2">
                  <span className="text-sm" style={{ color: "var(--ink-soft)" }}>{form.title}</span>
                  <span className="text-sm flex items-center gap-1.5" style={{ color: "var(--ink-soft)" }}>
                    <span key={current.id} className="cib-new-question-cue inline-block w-1.5 h-1.5 rounded-full" style={{ background: "var(--lamplight-deep)" }} />
                    {idx + 1} of {askable.length}
                  </span>
                </div>
                <div className="h-1 rounded-full w-full" style={{ background: "rgba(34,49,44,0.10)" }}>
                  <div className="h-1 rounded-full" style={{ width: progress + "%", background: "var(--lamplight)", transition: "width 300ms ease" }} />
                </div>
              </div>

              <div key={current.id} className="cib-fade flex-1 flex flex-col">
                <h1 className="cib-display text-2xl leading-snug mb-8" style={{ color: "var(--ink)" }}>
                  {current.text}
                </h1>

                <div className="flex flex-col gap-3">
                  {form.scale.map((label, i) => {
                    const selected = value === i;
                    return (
                      <button
                        key={i}
                        onClick={() => setAnswers({ ...answers, [current.id]: i })}
                        className="w-full rounded-2xl py-4 px-5 text-left text-base font-bold transition-all active:scale-[0.99]"
                        style={selected
                          ? { background: "var(--lamplight)", color: "var(--spruce-deep)", boxShadow: "0 0 0 3px rgba(242,182,83,0.35)" }
                          : { background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }
                        }
                      >
                        <span className="inline-block w-6 text-center mr-2 opacity-60">{i + (form.scaleStart || 1)}</span>
                        {label}
                      </button>
                    );
                  })}
                  <button
                    onClick={() => setAnswers({ ...answers, [current.id]: "na" })}
                    className="w-full rounded-2xl py-3 px-5 text-left text-sm font-bold transition-all active:scale-[0.99]"
                    style={value === "na"
                      ? { background: "var(--moss)", color: "var(--cream-on-dark)", boxShadow: "0 0 0 3px rgba(127,160,140,0.35)" }
                      : { background: "transparent", color: "var(--ink-soft)", border: "1px dashed rgba(34,49,44,0.25)" }
                    }
                  >
                    X — not observed / doesn't apply
                  </button>
                </div>
              </div>

              <div className="mt-8">
                {!canAdvance && (
                  <p className="text-sm mb-3 text-center" style={{ color: "var(--ink-soft)" }}>
                    Select a response to continue.
                  </p>
                )}
                <div className="flex gap-3">
                  <button onClick={back} className="rounded-2xl py-4 px-6 text-base font-bold transition-colors hover:bg-black/5" style={{ background: "rgba(34,49,44,0.05)", color: "var(--ink)", border: "1px solid rgba(34,49,44,0.14)" }}>
                    Back
                  </button>
                  <button
                    onClick={next}
                    disabled={!canAdvance}
                    aria-disabled={!canAdvance}
                    className="flex-1 rounded-2xl py-4 text-base font-bold transition-all"
                    style={canAdvance
                      ? { background: "var(--spruce)", color: "var(--cream-on-dark)" }
                      : { background: "rgba(34,49,44,0.10)", color: "rgba(34,49,44,0.35)", cursor: "not-allowed" }
                    }
                  >
                    {idx + 1 >= askable.length ? "Finish" : "Next"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ─── DONE / RESULTS ───
      const totals = sectionTotals();
      const answeredCount = askable.filter((q) => answers[q.id] !== undefined).length;
      // Grand total across all scored items
      let grand = 0, grandMissing = 0;
      askable.forEach((q) => {
        const s = getScore(q);
        if (s === null) grandMissing += 1; else grand += s;
      });
      const totalClass = classifySSP(grand, SSP_TOTAL_KEY.typicalMin, SSP_TOTAL_KEY.probableMin);
      // Section keys: official order first, then any custom sections
      const officialNames = SSP_SECTIONS.map((s) => s.name);
      const customNames = Object.keys(totals).filter((n) => !officialNames.includes(n));
      // Sections flagged as Probable or Definite Difference, for a quick-glance summary
      const flaggedSections = SSP_SECTIONS
        .map((s) => {
          const t = totals[s.name];
          if (!t) return null;
          const cls = classifySSP(t.sum, s.typicalMin, s.probableMin);
          return cls === "Typical Performance" ? null : { name: s.name, cls };
        })
        .filter(Boolean);

      return (
        <div className="cib-body min-h-screen w-full animate-[cibFade_320ms_ease_both]" style={{ background: "var(--paper)", color: "var(--ink)" }}>
          <style>{FONT_CSS_SSP}</style>
          <div className="max-w-md mx-auto px-4 py-8 cib-fade">
            <Eyebrow>All done</Eyebrow>
            <h1 className="cib-display text-3xl mb-2" style={{ color: "var(--spruce)" }}>Thank you.</h1>
            <p className="text-sm mb-6" style={{ color: "var(--ink-soft)" }}>
              {answeredCount} of {askable.length} items answered. Answers live only on this screen.
              Copy them before you close or start over.
            </p>

            {/* Child & respondent summary */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              <Eyebrow>Child & Respondent</Eyebrow>
              <div className="text-sm" style={{ color: "var(--ink-soft)" }}>
                <p><strong style={{ color: "var(--spruce)" }}>{raterInfo.childName || "(no name)"}</strong>{raterInfo.birthDate && ` · DOB ${raterInfo.birthDate}`}</p>
                <p>Completed by {raterInfo.completedBy || "(not provided)"}{raterInfo.relationship && ` (${raterInfo.relationship})`}</p>
                <p>{raterInfo.date || new Date().toLocaleDateString()}{raterInfo.providerName && ` · ${raterInfo.providerName}`}{raterInfo.discipline && ` (${raterInfo.discipline})`}</p>
              </div>
            </div>

            {/* Scoring toggle */}
            <div className="rounded-2xl p-3 mb-4 flex items-center justify-between" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              <span className="text-sm font-bold" style={{ color: "var(--spruce)" }}>Apply official scoring key</span>
              <button
                onClick={() => setUseKey((v) => !v)}
                role="switch"
                aria-checked={useKey}
                aria-label="Apply official scoring key"
                className="relative w-12 h-7 rounded-full transition-colors flex-shrink-0"
                style={{ background: useKey ? "var(--lamplight-deep)" : "var(--mist)" }}
              >
                <span className="absolute top-1 w-5 h-5 rounded-full bg-white transition-all" style={{ left: useKey ? "1.5rem" : "0.25rem" }} />
              </button>
            </div>

            {useKey && showResultsHelp && (
              <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <div className="flex justify-between items-start mb-2">
                  <Eyebrow>Understanding these results</Eyebrow>
                  <button onClick={() => setShowResultsHelp(false)} className="text-sm" style={{ color: "var(--ink-soft)" }}>✕</button>
                </div>
                <p className="text-xs mb-3" style={{ color: "var(--ink-soft)" }}>
                  The answer scale is reverse-scored: <strong>Always = 1</strong> … <strong>Never = 5</strong>. That
                  means a <strong>lower</strong> section total reflects <strong>more</strong> of the sensory-related
                  behaviors described — not less.
                </p>
                <div className="flex flex-col gap-2">
                  <div className="flex items-start gap-2">
                    <span className="text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 mt-0.5" style={{ background: sspClassColor("Typical Performance"), color: "var(--spruce-deep)" }}>Typical</span>
                    <span className="text-xs" style={{ color: "var(--ink-soft)" }}>Within the range typically seen in children without disabilities of the same age. No particular concern indicated by this score alone.</span>
                  </div>
                  <div className="flex items-start gap-2">
                    <span className="text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 mt-0.5" style={{ background: sspClassColor("Probable Difference"), color: "var(--spruce-deep)" }}>Probable</span>
                    <span className="text-xs" style={{ color: "var(--ink-soft)" }}>A mild-to-moderate difference from same-age peers without disabilities. Worth discussing with a qualified provider and monitoring over time.</span>
                  </div>
                  <div className="flex items-start gap-2">
                    <span className="text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 mt-0.5" style={{ background: sspClassColor("Definite Difference"), color: "var(--spruce-deep)" }}>Definite</span>
                    <span className="text-xs" style={{ color: "var(--ink-soft)" }}>A significant difference from same-age peers without disabilities. This typically warrants referral for further evaluation (for example, by an occupational therapist).</span>
                  </div>
                </div>
                <p className="text-xs mt-3" style={{ color: "var(--ink-soft)" }}>
                  These classifications come from the published norms (n = 1,037 children without
                  disabilities) and describe this score only — they are not a diagnosis. A qualified
                  evaluator should interpret results alongside the official manual and other clinical
                  information.
                </p>
              </div>
            )}

            {useKey && (
              <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
                <Eyebrow>At a glance</Eyebrow>
                {flaggedSections.length === 0 ? (
                  <p className="text-sm" style={{ color: "var(--spruce)" }}>
                    <strong>All 7 sections</strong> fall within Typical Performance.
                  </p>
                ) : (
                  <>
                    <p className="text-sm mb-2" style={{ color: "var(--ink)" }}>
                      <strong>{flaggedSections.length}</strong> of 7 section{flaggedSections.length === 1 ? "" : "s"} {flaggedSections.length === 1 ? "shows" : "show"} a difference from typical performance:
                    </p>
                    <div className="flex flex-col gap-1.5">
                      {flaggedSections.map((f) => (
                        <div key={f.name} className="flex items-center justify-between">
                          <span className="text-sm" style={{ color: "var(--ink)" }}>{f.name}</span>
                          <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: sspClassColor(f.cls), color: "var(--spruce-deep)" }}>{f.cls}</span>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            )}

            {/* Section totals */}
            <div className="rounded-2xl p-4 mb-4" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
              <Eyebrow dark>Section raw score totals</Eyebrow>
              {SSP_SECTIONS.map((s) => {
                const t = totals[s.name];
                if (!t) return null;
                const cls = classifySSP(t.sum, s.typicalMin, s.probableMin);
                return (
                  <div key={s.name} className="py-2" style={{ borderBottom: "1px solid rgba(255,255,255,0.12)" }}>
                    <div className="flex justify-between items-baseline">
                      <span className="font-bold text-sm">{s.name}</span>
                      <span className="cib-display text-lg">
                        {t.sum}
                        <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}> / {s.max}</span>
                      </span>
                    </div>
                    {useKey && (
                      <div className="flex justify-between items-center mt-1">
                        <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: sspClassColor(cls), color: "var(--spruce-deep)" }}>
                          {cls}
                        </span>
                        {t.missing > 0 && (
                          <span className="text-xs" style={{ color: "var(--soft-on-dark)" }}>{t.missing} not scored</span>
                        )}
                      </div>
                    )}
                    {!useKey && t.missing > 0 && (
                      <div className="text-xs mt-1" style={{ color: "var(--soft-on-dark)" }}>{t.missing} not scored</div>
                    )}
                  </div>
                );
              })}
              {customNames.map((name) => {
                const t = totals[name];
                return (
                  <div key={name} className="py-2" style={{ borderBottom: "1px solid rgba(255,255,255,0.12)" }}>
                    <div className="flex justify-between items-baseline">
                      <span className="font-bold text-sm">{name}</span>
                      <span className="cib-display text-lg">{t.sum}<span className="text-sm" style={{ color: "var(--soft-on-dark)" }}> ({t.n})</span></span>
                    </div>
                    {useKey && <div className="text-xs mt-1" style={{ color: "var(--soft-on-dark)" }}>No official cut scores for this custom section.</div>}
                  </div>
                );
              })}
              <div className="flex justify-between items-baseline pt-3 mt-1">
                <span className="font-bold text-sm">Total</span>
                <span className="cib-display text-xl">
                  {grand}
                  <span className="text-sm" style={{ color: "var(--soft-on-dark)" }}> / {SSP_TOTAL_KEY.max}</span>
                </span>
              </div>
              {useKey && (
                <div className="flex justify-between items-center mt-1">
                  <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: sspClassColor(totalClass), color: "var(--spruce-deep)" }}>
                    {totalClass}
                  </span>
                  {grandMissing > 0 && <span className="text-xs" style={{ color: "var(--soft-on-dark)" }}>{grandMissing} not scored</span>}
                </div>
              )}
              <p className="text-xs mt-3" style={{ color: "var(--soft-on-dark)" }}>
                {useKey
                  ? "Classifications are norm-based (n = 1,037 children without disabilities). Verify against the official SSP summary sheet before clinical use."
                  : "Raw totals only. Toggle the scoring key above to apply classifications."}
              </p>
            </div>

            {/* Item-by-item */}
            <div className="rounded-2xl p-4 mb-6" style={{ background: "var(--card)", border: "1px solid var(--mist)" }}>
              {askable.map((q, i) => {
                const v = answers[q.id];
                const score = getScore(q);
                let a = "Skipped";
                if (v === "na") a = "X — not observed";
                else if (score !== null) a = form.scale[v];
                return (
                  <div key={q.id} className="py-3" style={i < askable.length - 1 ? { borderBottom: "1px solid var(--mist)" } : {}}>
                    <div className="flex justify-between items-start gap-2">
                      <div className="text-sm" style={{ color: "var(--ink-soft)" }}>{i + 1}. {q.text}</div>
                      {score !== null && <div className="text-xs font-bold flex-shrink-0" style={{ color: "var(--lamplight-deep)" }}>{score}</div>}
                    </div>
                    <div className="font-bold mt-1" style={{ color: "var(--spruce)" }}>{a}</div>
                  </div>
                );
              })}
            </div>

            <div className="flex gap-3 mb-3">
              <button onClick={copySummary} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--spruce)", color: "var(--cream-on-dark)" }}>
                {copied ? "Copied" : "Copy answers"}
              </button>
              <button onClick={exportPDF} className="flex-1 rounded-2xl py-4 text-base font-bold transition-colors hover:bg-opacity-90" style={{ background: "var(--lamplight-deep)", color: "var(--spruce-deep)" }}>
                Export PDF
              </button>
            </div>
            <div className="flex gap-3">
              <button onClick={startFill} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                New check-in
              </button>
              <button onClick={() => setMode("build")} className="flex-1 rounded-2xl py-3 text-base font-bold transition-colors hover:bg-[#FAF8F5]" style={{ background: "var(--card)", color: "var(--spruce)", border: "1px solid var(--mist)" }}>
                Back to builder
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────
    // Component 5: Portal Router / Selection Dashboard
    // ─────────────────────────────────────────────────────────────
    function App() {
      const [assessment, setAssessment] = useState(null);

      // Parse location hash for deep-linking routing
      useEffect(() => {
        const handleHash = () => {
          const hash = window.location.hash;
          if (hash === "#psi") {
            setAssessment("psi");
          } else if (hash === "#pkbs") {
            setAssessment("pkbs");
          } else if (hash === "#tesi") {
            setAssessment("tesi");
          } else if (hash === "#ssp") {
            setAssessment("ssp");
          } else {
            setAssessment(null);
          }
        };
        handleHash(); // Run on mount
        window.addEventListener("hashchange", handleHash);
        return () => window.removeEventListener("hashchange", handleHash);
      }, []);

      const selectAssessment = (type) => {
        window.location.hash = type;
      };

      const clearAssessment = () => {
        window.location.hash = "";
      };

      if (assessment === "psi") {
        return <PSI4SFRecorder onBack={clearAssessment} />;
      }

      if (assessment === "pkbs") {
        return <PKBS2Recorder onBack={clearAssessment} />;
      }

      if (assessment === "tesi") {
        return <TESIPRRRecorder onBack={clearAssessment} />;
      }

      if (assessment === "ssp") {
        return <SSPRecorder onBack={clearAssessment} />;
      }

      return (
        <div className="cib-body min-h-screen w-full flex flex-col justify-between" style={{ background: "var(--paper)", color: "var(--ink)" }}>

          <div className="max-w-md mx-auto w-full px-5 py-12 flex flex-col items-center">

            {/* Brand Header */}
            <div className="text-center mb-10">
              <h1 className="cib-display text-3xl font-bold tracking-tight mb-2 text-[#1F3A34]">
                Assessment Recorders
              </h1>
              <p className="text-sm text-[#5C6E66]">
                Phone-first digital response recorders and raw score calculators for clinicians.
              </p>
            </div>

            {/* Selection Cards */}
            <div className="w-full flex flex-col gap-5 mb-12">

              {/* PSI-4-SF Card */}
              <button
                onClick={() => selectAssessment("psi")}
                className="w-full text-left bg-white p-6 rounded-2xl border border-[#E4E9E2] hover:border-[#7FA08C] hover:shadow-md transition-all active:scale-[0.99] group"
              >
                <div className="flex justify-between items-start mb-3">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#7FA08C]">
                    Parenting Stress
                  </span>
                  <span className="text-xs font-medium text-[#5C6E66] bg-[#E4E9E2] px-2.5 py-1 rounded-full">
                    36 Items
                  </span>
                </div>
                <h2 className="cib-display text-xl font-bold text-[#1F3A34] mb-2 group-hover:text-[#7FA08C] transition-colors">
                  PSI-4-SF Recorder
                </h2>
                <p className="text-sm text-[#5C6E66]">
                  Record answers and compute raw subscale scores for Parent Distress, Dysfunctional Interaction, and Difficult Child.
                </p>
              </button>

              {/* PKBS-2 Card */}
              <button
                onClick={() => selectAssessment("pkbs")}
                className="w-full text-left bg-white p-6 rounded-2xl border border-[#E4E9E2] hover:border-[#7FA08C] hover:shadow-md transition-all active:scale-[0.99] group"
              >
                <div className="flex justify-between items-start mb-3">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#9E4A5B]">
                    Preschool &amp; Kindergarten
                  </span>
                  <span className="text-xs font-medium text-[#5C6E66] bg-[#E4E9E2] px-2.5 py-1 rounded-full">
                    76 Items
                  </span>
                </div>
                <h2 className="cib-display text-xl font-bold text-[#1F3A34] mb-2 group-hover:text-[#9E4A5B] transition-colors">
                  PKBS-2 Recorder
                </h2>
                <p className="text-sm text-[#5C6E66]">
                  Record observations of Social Skills (Cooperation, Interaction, Independence) and Problem Behaviors.
                </p>
              </button>

              {/* TESI-PRR Card */}
              <button
                onClick={() => selectAssessment("tesi")}
                className="w-full text-left bg-white p-6 rounded-2xl border border-[#E4E9E2] hover:border-[#B4552E] hover:shadow-md transition-all active:scale-[0.99] group"
              >
                <div className="flex justify-between items-start mb-3">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#B4552E]">
                    Trauma Screening
                  </span>
                  <span className="text-xs font-medium text-[#5C6E66] bg-[#E4E9E2] px-2.5 py-1 rounded-full">
                    24 Items
                  </span>
                </div>
                <h2 className="cib-display text-xl font-bold text-[#1F3A34] mb-2 group-hover:text-[#B4552E] transition-colors">
                  TESI-PRR Recorder
                </h2>
                <p className="text-sm text-[#5C6E66]">
                  Interviewer-administered Yes/No/Unsure screen of a child's history of exposure to potentially traumatic events.
                </p>
              </button>

              {/* Short Sensory Profile Card */}
              <button
                onClick={() => selectAssessment("ssp")}
                className="w-full text-left bg-white p-6 rounded-2xl border border-[#E4E9E2] hover:border-[#D99A2B] hover:shadow-md transition-all active:scale-[0.99] group"
              >
                <div className="flex justify-between items-start mb-3">
                  <span className="text-xs font-bold uppercase tracking-wider text-[#D99A2B]">
                    Sensory Processing
                  </span>
                  <span className="text-xs font-medium text-[#5C6E66] bg-[#E4E9E2] px-2.5 py-1 rounded-full">
                    38 Items
                  </span>
                </div>
                <h2 className="cib-display text-xl font-bold text-[#1F3A34] mb-2 group-hover:text-[#D99A2B] transition-colors">
                  Short Sensory Profile
                </h2>
                <p className="text-sm text-[#5C6E66]">
                  Record caregiver ratings across 7 sensory sections, with an optional official scoring key for Typical / Probable / Definite classifications.
                </p>
              </button>

            </div>

            {/* Footer info */}
            <div className="text-center text-xs text-[#5C6E66] border-t border-[#E4E9E2] pt-6 w-full">
              <p className="mb-4">
                These tools are for digital recording convenience only. Scoring interpretation must be conducted by qualified professionals using official clinical manuals.
              </p>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Register the service worker so the app is cached for full offline use -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (err) {
          console.warn("Service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
